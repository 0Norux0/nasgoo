      - name: Phase 11B.4 v11B.4.2 — Defect 1 (routes in vendor:approved group)
        run: |
          # Grep for the vendor.intelligence route names in the file, then
          # verify the enclosing group middleware is vendor:approved.
          # A simple sanity check: the routes must be within N lines of the
          # vendor:approved opener line 182+, not the plain auth group.
          python3 <<'PY'
          import re
          import sys
          text = open('routes/web.php').read().splitlines()
          # Find each vendor.intelligence.* route name line
          intel_lines = [i for i, l in enumerate(text) if 'vendor.intelligence.index' in l or 'vendor.intelligence.dismiss' in l or 'vendor.intelligence.snooze' in l]
          # Find each group opener
          groups = []
          for i, l in enumerate(text):
              m = re.search(r"Route::middleware\(\[?(.+?)\]?\)->group", l)
              if m:
                  groups.append((i, m.group(1)))
          def enclosing(idx):
              # nearest group opener BEFORE this line
              for gi, gmw in reversed(groups):
                  if gi < idx:
                      return gmw
              return None
          bad = []
          for il in intel_lines:
              mw = enclosing(il)
              if mw is None or 'vendor:approved' not in mw:
                  bad.append((il+1, mw))
          if bad:
              print("::error::vendor.intelligence.* routes NOT in vendor:approved group:")
              for b in bad: print(f"    line {b[0]} — enclosing group middleware: {b[1]}")
              sys.exit(1)
          print(f"✓ v11B.4.2 Defect 1 — all {len(intel_lines)} vendor.intelligence routes are inside vendor:approved group")
          PY

