            "tests/Feature/Phase5V61RegressionTest.php|Phase 5 v6.1: regression — Wishlist menu visibility (auth.user shared prop), /wishlist auth check, /orders/{id}/confirm under strict-mode does NOT lazy-load events.actor (multi-event online payment flow), ViewOrder header actions present, admin can mark delivered, approved/pending/rejected/suspended vendor menu visibility via vendor_status shared prop, /vendor/payouts alias, vendor payout scoping"
