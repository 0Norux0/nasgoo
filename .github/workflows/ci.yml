      - name: Phase 9 v9.5 — ReviewService::approve eager-loads product BEFORE lazy-loading would throw
        run: |
          # ROOT CAUSE (the v9.4 → v9.5 manually-confirmed bug): admin
          # clicks "Approve review" in Filament → ProductReviewResource
          # passed the record WITHOUT product eager-loaded → ReviewService::approve
          # called $review->product inside the transaction → AppServiceProvider's
          # Model::shouldBeStrict(!isProduction()) raised
          # LazyLoadingViolationException → transaction rolled back → review
          # stayed pending → admin saw a Filament error → developer thought
          # "the review just doesn't appear on the product page after approval."
          #
          # v9.5 fixes BOTH:
          #   (a) ReviewService::approve now loadMissing's 'product' BEFORE
          #       the transaction, defending against any caller that didn't
          #       pre-load it
          #   (b) ProductReviewResource::getEloquentQuery eager-loads
          #       product + user + orderItem so the Filament list AND
          #       row-level actions always receive a fully-hydrated record
          #
          # This check enforces both at static-source level.
          python3 << 'PY'
          import sys, re
          from pathlib import Path

          svc = Path('app/Domain/Review/ReviewService.php').read_text()
          # The approve method body MUST loadMissing('product') before transaction
          m = re.search(r'public function approve\([^{]*\{(.+?)^\s*\}', svc, re.DOTALL | re.MULTILINE)
          if not m:
              print("::error::Phase 9 v9.5: ReviewService::approve method not found")
              sys.exit(1)
          body = m.group(1)
          if "loadMissing('product')" not in body:
              print("::error file=app/Domain/Review/ReviewService.php::Phase 9 v9.5: ReviewService::approve must call loadMissing('product') BEFORE the transaction (strict-mode lazy-load fix)")
              sys.exit(1)

          res = Path('app/Filament/Resources/ProductReviewResource.php').read_text()
          if 'getEloquentQuery' not in res:
              print("::error file=app/Filament/Resources/ProductReviewResource.php::Phase 9 v9.5: ProductReviewResource must override getEloquentQuery to eager-load product + user + orderItem")
              sys.exit(1)
          for rel in ['product:', 'user:', 'orderItem:']:
              if rel not in res:
                  print(f"::error file=app/Filament/Resources/ProductReviewResource.php::Phase 9 v9.5: ProductReviewResource::getEloquentQuery must eager-load {rel}")
                  sys.exit(1)
          print("✓ Phase 9 v9.5 — ReviewService::approve + ProductReviewResource defend against strict-mode lazy-load")
          PY

