                \$req->setUserResolver(fn () => \$vendorUser);
                \$resp = \$kernel->handle(\$req);
                if (\$resp->getStatusCode() >= 500) {
                    fwrite(STDERR, 'Phase 6 FAIL — GET '.\$url.' returned '.\$resp->getStatusCode().' under strict mode.'.PHP_EOL);
                    fwrite(STDERR, 'Body: ' . substr((string) \$resp->getContent(), 0, 600).PHP_EOL);
                    exit(1);
                }
                echo 'Phase 6 step 4: GET '.\$url.' → '.\$resp->getStatusCode().' ✓'.PHP_EOL;
            }
          "

          echo "== Step 5: admin Filament supplier pages open under strict mode ==" >&2
          php artisan tinker --execute="
            \Illuminate\Database\Eloquent\Model::shouldBeStrict(true);
            \$kernel = app(\Illuminate\Contracts\Http\Kernel::class);
            \$admin = \App\Models\User::where('email', 'admin@marketplace.test')->firstOrFail();

            foreach ([
                '/admin/supplier-platforms',
                '/admin/supplier-integrations',
                '/admin/supplier-products',
