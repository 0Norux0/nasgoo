                fwrite(STDERR, 'Confirm did not write audit log.'); exit(1);
            }
            echo 'v6.3 step 6 OK — Confirm transitions status + writes event + writes audit log.' . PHP_EOL;
          "

          echo PHP_EOL . '✅ v6.3 OK — migrate:fresh --seed succeeds; permissions registered; super_admin can() each; actionable demo orders exist; visibility predicates evaluate true; lifecycle transitions write events + audit logs.'

      - name: v6.4 — admin order pages open under strict mode (no lazy-load)
        env:
          APP_ENV: local
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_DATABASE: marketplace_testing
          DB_USERNAME: marketplace
          DB_PASSWORD: secret
          REDIS_HOST: 127.0.0.1
        run: |
          set -e
          # The v6.3 dev report: opening /admin/orders threw
          #   "Attempted to lazy load [latestPayment] on model [App\Models\Order]"
          # because OrderResource::getEloquentQuery() eager-loaded payments but
          # not latestPayment. Every row's COD-capture / Transfer-confirm /
          # Refund action visibility predicate reads $record->latestPayment
          # → lazy-load crash under Model::shouldBeStrict.
          #
          # This step dispatches REAL HTTP GETs to:
          #   /admin/orders
          #   /admin/orders/{id}/edit
          #   /admin/orders/{id}
          # under strict mode. If any lazy-load fires, the response is 500
          # and this step fails — catching the bug class end-to-end.

          php artisan tinker --execute="
            \Illuminate\Database\Eloquent\Model::shouldBeStrict(true);

            \$admin = \App\Models\User::where('email', 'admin@marketplace.test')->firstOrFail();
            \$kernel = app(\Illuminate\Contracts\Http\Kernel::class);

            // 1) GET /admin/orders (the page that crashed in v6.3)
            \$req = \Illuminate\Http\Request::create('/admin/orders', 'GET');
            \$req->setUserResolver(fn () => \$admin);
            \$resp = \$kernel->handle(\$req);
            \$status = \$resp->getStatusCode();
            if (\$status >= 500) {
                fwrite(STDERR, 'v6.4 FAIL — GET /admin/orders returned '.\$status.' under strict mode.' . PHP_EOL);
                fwrite(STDERR, 'Body excerpt: ' . substr((string) \$resp->getContent(), 0, 800) . PHP_EOL);
                exit(1);
            }
            echo 'v6.4 step 1: GET /admin/orders → '.\$status.' ✓' . PHP_EOL;

            // Pick the seeded DEMO-ACTIONABLE-PAID order (multiple rows in the
            // table; we need a real id for the next requests).
            \$paid = \App\Models\Order::where('number', 'like', 'DEMO-ACTIONABLE-PAID%')->firstOrFail();

            // 2) GET /admin/orders/{id}/edit
            \$req = \Illuminate\Http\Request::create('/admin/orders/'.\$paid->id.'/edit', 'GET');
            \$req->setUserResolver(fn () => \$admin);
            \$resp = \$kernel->handle(\$req);
            \$status = \$resp->getStatusCode();
            if (\$status >= 500) {
                fwrite(STDERR, 'v6.4 FAIL — GET /admin/orders/'.\$paid->id.'/edit returned '.\$status.' under strict mode.' . PHP_EOL);
                fwrite(STDERR, 'Body excerpt: ' . substr((string) \$resp->getContent(), 0, 800) . PHP_EOL);
                exit(1);
            }
            echo 'v6.4 step 2: GET /admin/orders/'.\$paid->id.'/edit → '.\$status.' ✓' . PHP_EOL;

            // 3) GET /admin/orders/{id} (view route)
            \$req = \Illuminate\Http\Request::create('/admin/orders/'.\$paid->id, 'GET');
            \$req->setUserResolver(fn () => \$admin);
            \$resp = \$kernel->handle(\$req);
            \$status = \$resp->getStatusCode();
            if (\$status >= 500) {
                fwrite(STDERR, 'v6.4 FAIL — GET /admin/orders/'.\$paid->id.' returned '.\$status.' under strict mode.' . PHP_EOL);
                fwrite(STDERR, 'Body excerpt: ' . substr((string) \$resp->getContent(), 0, 800) . PHP_EOL);
                exit(1);
            }
            echo 'v6.4 step 3: GET /admin/orders/'.\$paid->id.' → '.\$status.' ✓' . PHP_EOL;

            // 4) Same for a multi-event order (catches events.actor lazy-load)
            \$paid->events()->create(['event_type' => 'a', 'message' => 'a', 'actor_id' => \$admin->id, 'actor_role' => 'admin']);
            \$paid->events()->create(['event_type' => 'b', 'message' => 'b', 'actor_id' => \$admin->id, 'actor_role' => 'admin']);
            \$paid->events()->create(['event_type' => 'c', 'message' => 'c', 'actor_id' => \$admin->id, 'actor_role' => 'admin']);

            \$req = \Illuminate\Http\Request::create('/admin/orders/'.\$paid->id, 'GET');
            \$req->setUserResolver(fn () => \$admin);
            \$resp = \$kernel->handle(\$req);
            \$status = \$resp->getStatusCode();
            if (\$status >= 500) {
                fwrite(STDERR, 'v6.4 FAIL — GET /admin/orders/{id} with multi-event order returned '.\$status.PHP_EOL);
                fwrite(STDERR, 'Body excerpt: ' . substr((string) \$resp->getContent(), 0, 800) . PHP_EOL);
                exit(1);
            }
            echo 'v6.4 step 4: GET /admin/orders/'.\$paid->id.' (with multiple events) → '.\$status.' ✓' . PHP_EOL;

            echo PHP_EOL . '✅ v6.4 OK — admin order pages open under strict mode with no lazy-load on latestPayment, items, events.actor, or any relation accessed in admin closures.' . PHP_EOL;
          "

      - name: Phase 6 — supplier platforms, integrations, imports, and dropship checkout end-to-end
