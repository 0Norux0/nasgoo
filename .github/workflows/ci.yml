              echo "::error::Phase 10 v10.16: $WELCOME still has $UNSAFE unsafe user.permissions.<method> reads — must use 'user.permissions ?? []' instead"
              grep -nE "user\.permissions\.(length|map|forEach|filter|reduce|find)" $WELCOME
              exit 1
          fi
          # The defensive normalization pattern must be present
