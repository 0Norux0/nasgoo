            exit 1
          fi
          echo "DemoSeeder throws helpful APP_KEY error message ✓"

          echo "== v7.1 sub-check 4: SupplierIntegration encrypted credentials are not plaintext (re-asserted) ==" >&2
          php artisan tinker --execute="
            \$integration = \App\Models\SupplierIntegration::first();
            if (! \$integration) {
