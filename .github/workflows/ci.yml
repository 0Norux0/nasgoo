          # Get a fresh CSRF cookie + token
          curl -s -c /tmp/v75_cookies.txt -o /tmp/register.html http://127.0.0.1:8095/register
          TOKEN=$(grep -oE 'name="_token" value="[^"]+"' /tmp/register.html | head -1 | sed 's/.*value="//;s/"//')
          XSRF=$(grep -oE 'XSRF-TOKEN[^	]+	([^	]+)' /tmp/v75_cookies.txt | awk '{print $NF}' | python3 -c "import urllib.parse, sys; print(urllib.parse.unquote(sys.stdin.read().strip()))")

          # POST /register with MAIL_MAILER=log
          CODE=$(curl -s -o /tmp/register_resp.html -w "%{http_code}" \
              -b /tmp/v75_cookies.txt -c /tmp/v75_cookies.txt \
              -H "X-XSRF-TOKEN: $XSRF" \
              -H "X-Requested-With: XMLHttpRequest" \
              -X POST \
              -d "_token=$TOKEN&name=CI+Test+User&email=ci-v75-log@test.example&password=StrongPass123&password_confirmation=StrongPass123&terms=1" \
              http://127.0.0.1:8095/register)

          kill $PID 2>/dev/null || true

          if [ "$CODE" -ge "500" ]; then
              echo "v7.5 FAIL — registration with MAIL_MAILER=log returned HTTP $CODE (expected < 500)" >&2
              cat /tmp/register_resp.html | head -80 >&2
              echo "Server log:" >&2
              tail -50 /tmp/serve_v75.log >&2
              exit 1
          fi

          # Verify the user row was created with customer role
          php artisan tinker --execute="
            \$u = \App\Models\User::where('email', 'ci-v75-log@test.example')->first();
            if (! \$u) { fwrite(STDERR, 'v7.5 FAIL — user row not created'.PHP_EOL); exit(1); }
            if (! \$u->hasRole('customer')) { fwrite(STDERR, 'v7.5 FAIL — user does not have customer role'.PHP_EOL); exit(1); }
            echo 'v7.5: user '.\$u->email.' created with customer role (HTTP '.'$CODE'.') ✓'.PHP_EOL;
          "

          echo "v7.5 OK — registration succeeds with MAIL_MAILER=log (the v7.5 default) ✓"

      - name: Phase 7 v7.6 — checkout-time lazy-load defense (static check)
        run: |
          # ROOT CAUSE (v7.5 dev report): post-checkout redirect to
          # /orders/{id}/confirm crashed with:
          #   "Attempted to lazy load [customizations] on model
          #    [App\Models\OrderItem] but lazy loading is disabled."
          # OrderController::confirm eager-loaded 'items' but not
          # 'items.customizations' / 'items.latestProof', yet its present()
          # helper iterates both — the same present() that OrderController::show
          # already eager-loaded for.
          #
          # v7.6 ships defense-in-depth at 4 sites:
          #   1. OrderController::confirm    (the direct bug)
          #   2. CheckoutService::place      (returned $order is pre-loaded)
          #   3. DropshipOrderCreator         (loadMissing includes customizations)
          #   4. Filament OrderResource       (admin query includes them)
          #
          # This static check greps each file to assert the relations are
          # present so the defense can't be silently removed.
          python3 << 'PY'
          import re, sys
          from pathlib import Path

          issues = []

          # 1. OrderController::confirm must eager-load both relations
          src = Path('app/Http/Controllers/OrderController.php').read_text()
          m = re.search(r'public function confirm\(.*?\n    \}', src, re.DOTALL)
          if not m:
              issues.append(('OrderController.php', 'confirm() method not found'))
          else:
              body = m.group(0)
              if "'items.customizations'" not in body:
                  issues.append(('OrderController::confirm', "missing 'items.customizations' eager-load"))
              if "'items.latestProof'" not in body:
                  issues.append(('OrderController::confirm', "missing 'items.latestProof' eager-load"))

          # 2. CheckoutService::place must return $order->fresh([... items.customizations ...])
          src = Path('app/Domain/Order/CheckoutService.php').read_text()
          if not re.search(r"\$order->fresh\(\[[^\]]*'items\.customizations'", src, re.DOTALL):
              issues.append(('CheckoutService::place', "$order->fresh(...) does not include 'items.customizations'"))
          if not re.search(r"\$order->fresh\(\[[^\]]*'items\.latestProof'", src, re.DOTALL):
              issues.append(('CheckoutService::place', "$order->fresh(...) does not include 'items.latestProof'"))

          # 3. DropshipOrderCreator::createFromOrder must loadMissing items.customizations
          src = Path('app/Domain/Supplier/DropshipOrderCreator.php').read_text()
          if not re.search(r"loadMissing\(\[[^\]]*'items\.customizations'", src, re.DOTALL):
              issues.append(('DropshipOrderCreator', "loadMissing does not include 'items.customizations'"))

          # 4. Filament OrderResource::getEloquentQuery must include both
          src = Path('app/Filament/Resources/OrderResource.php').read_text()
          m = re.search(r'public static function getEloquentQuery\(\).*?\n    \}', src, re.DOTALL)
          if not m:
              issues.append(('Filament OrderResource', 'getEloquentQuery() not found'))
          else:
              body = m.group(0)
              if "'items.customizations'" not in body:
                  issues.append(('Filament OrderResource::getEloquentQuery', "missing 'items.customizations'"))
              if "'items.latestProof'" not in body:
                  issues.append(('Filament OrderResource::getEloquentQuery', "missing 'items.latestProof'"))

          if issues:
              print(f"::error::Phase 7 v7.6 checkout-time lazy-load defense FAILED — {len(issues)} missing eager-load(s):")
              for f, msg in issues: print(f"::error file={f}::{msg}")
              sys.exit(1)
          print("✓ Phase 7 v7.6 checkout-time lazy-load defense: all 4 sites eager-load items.customizations + items.latestProof.")
          PY

