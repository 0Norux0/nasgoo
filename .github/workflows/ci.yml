          grep -q "safelist:" $TW || {
              echo "::error::Phase 11A v11A.2: Tailwind safelist missing — needed to guarantee container classes survive any build/scanner failure"
              exit 1
          }
          # Extract the safelist block and verify each critical class is in it
          SAFELIST=$(awk '/safelist:/,/\],/' $TW)
          for CLS in "'mx-auto'" "'w-full'" "'max-w-7xl'" "'px-4'" "'sm:px-6'" "'lg:px-8'" "'xl:px-10'"; do
              echo "$SAFELIST" | grep -qF "$CLS" || {
                  echo "::error::Phase 11A v11A.2: Tailwind safelist missing class $CLS"
                  exit 1
              }
          done
          echo "✓ Phase 11A v11A.2 — Tailwind safelist contains all critical container classes"

