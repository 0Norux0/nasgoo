              grep -q "from '@/Components/Layout/Container'" "$F" || {
                  echo "::error::Phase 11A v11A.2: $F not importing Container from canonical path"
                  exit 1
              }
              # Must NOT import from the v11A.1 path
              if grep -q "from '@/Components/ui/v11/Container'" "$F"; then
                  echo "::error::Phase 11A v11A.2: $F still importing from obsolete v11A.1 path"
                  exit 1
