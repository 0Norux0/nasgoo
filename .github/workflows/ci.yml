      - name: Phase 7 v7.1 — schema-vs-code pre-flight (prevents v7.0 column-mismatch bug class)
        run: |
          # ROOT CAUSE (v7.0 dev report): the Phase 7 demo seeder tried to
          # insert `fulfillment_type` into the `products` table — but the
          # actual column added by Phase 6 is `fulfillment_mode`. SQL failed
          # at runtime: "Column not found: 1054 Unknown column
          # 'fulfillment_type' in 'INSERT INTO'".
          #
          # v7.1 adds this pre-flight that scans every Phase 7 PHP write
          # path (Model::create / firstOrCreate / updateOrCreate /
          # ->relation()->create / ->createMany) and asserts:
          #   1. each TOP-LEVEL key exists in the model's $fillable
          #   2. each TOP-LEVEL key exists as a column defined by an `up()`
          #      method in some migration on the relevant table
          #
          # Both checks must pass. The pre-flight runs BEFORE the heavier
          # `migrate:fresh --seed` sub-check below so the failure message
          # is specific ("DemoSeeder uses Product.fulfillment_type but no
          # migration creates that column") instead of a generic SQL error.
          python3 << 'PY'
          import re, sys
          from pathlib import Path

          mig_files = sorted(Path('database/migrations').glob('*.php'))

          def extract_closure_body(src, open_idx):
              depth = 0
              for i in range(open_idx, len(src)):
                  if src[i] == '{': depth += 1
                  elif src[i] == '}':
                      depth -= 1
                      if depth == 0: return src[open_idx + 1:i]
              return ''

          def up_body(src):
              sig = re.search(r"public function up\(\)\s*:\s*void\s*\{", src)
              return extract_closure_body(src, sig.end() - 1) if sig else ''

          def columns_for_table(table):
              cols = set()
              for m in mig_files:
                  up = up_body(m.read_text())
                  if not up: continue
                  for kw in ['create', 'table']:
                      for sig in re.finditer(rf"Schema::{kw}\(\s*'{table}'\s*,\s*function\s*\(\s*Blueprint\s+\$table\s*\)\s*\{{", up):
                          body = extract_closure_body(up, sig.end() - 1)
                          for cm in re.finditer(r"\$table->\w+\(\s*'([a-z_]+)'", body):
                              cols.add(cm.group(1))
                          for drop in re.finditer(r"->dropColumn\(\s*'([a-z_]+)'\s*\)", body):
                              cols.discard(drop.group(1))
                          for db in re.finditer(r"->dropColumn\(\s*\[(.*?)\]\s*\)", body, re.DOTALL):
                              for col in re.findall(r"'([a-z_]+)'", db.group(1)):
                                  cols.discard(col)
                          if re.search(r"\$table->timestamps\(\)", body): cols |= {'created_at','updated_at'}
                          if re.search(r"\$table->id\(\)", body): cols.add('id')
              return cols

          def fillable_for(model):
              p = Path(f'app/Models/{model}.php')
              if not p.exists(): return set()
              s = p.read_text()
              m = re.search(r"protected\s+\$fillable\s*=\s*\[(.*?)\];", s, re.DOTALL)
              return set(re.findall(r"'([a-z_]+)'", m.group(1))) if m else set()

          def extract_balanced(src, start):
              depth = 0
              for i in range(start, len(src)):
                  if src[i] == '[': depth += 1
                  elif src[i] == ']':
                      depth -= 1
                      if depth == 0: return src[start+1:i], i
              return '', -1

          def top_level_keys(block):
              out, depth, i = [], 0, 0
              while i < len(block):
                  c = block[i]
                  if c == '[': depth += 1
                  elif c == ']': depth -= 1
                  elif depth == 0 and c == "'":
                      j = block.find("'", i+1)
                      if j > 0:
                          key = block[i+1:j]
                          rest = block[j+1:].lstrip()
                          if rest.startswith('=>'): out.append(key)
                          i = j + 1; continue
                  i += 1
              return out

          models = ['Product','CartItem','CartItemCustomization','OrderItem','OrderItemCustomization',
                    'CustomizationProof','ProductCustomizationField','Order','OrderAddress']
          table_for = {'Product':'products','CartItem':'cart_items','CartItemCustomization':'cart_item_customizations',
                       'OrderItem':'order_items','OrderItemCustomization':'order_item_customizations',
                       'CustomizationProof':'customization_proofs','ProductCustomizationField':'product_customization_fields',
                       'Order':'orders','OrderAddress':'order_addresses'}
          fmap = {m: fillable_for(m) for m in models}
          cmap = {table_for[m]: columns_for_table(table_for[m]) for m in models}

          phase7_php = [
              'database/seeders/DemoSeeder.php',
              'app/Domain/Customization/CustomizationCartService.php',
              'app/Domain/Customization/CustomizationFieldValidator.php',
              'app/Domain/Customization/ProofWorkflowService.php',
              'app/Http/Controllers/CustomizationCartController.php',
              'app/Http/Controllers/CustomerProofResponseController.php',
              'app/Http/Controllers/CustomizationFileController.php',
              'app/Http/Controllers/Vendor/VendorCustomizationFieldController.php',
              'app/Http/Controllers/Vendor/VendorCustomizationProofController.php',
              'app/Domain/Order/CheckoutService.php',
          ]
          bad = []
          for f in phase7_php:
              src = Path(f).read_text()
              if f.endswith('DemoSeeder.php'):
                  sub = re.search(r'private function seedCustomizableProductsAndOrder\(\): void\s*\{', src)
                  if sub:
                      src = extract_closure_body(src, sub.end() - 1)
              for model in models:
                  for m in re.finditer(rf'(?:\\?App\\Models\\)?{model}::(?:create|firstOrCreate|updateOrCreate)\s*\(', src):
                      after = src[m.end():]; bi = after.find('[')
                      if bi < 0: continue
                      inner, close = extract_balanced(src, m.end() + bi)
                      if close < 0: continue
                      call = src[m.start():m.end()].split('::')[1].split('(')[0]
                      if call in ('firstOrCreate', 'updateOrCreate'):
                          tail = src[close+1:]; nb = tail.find('[')
                          if nb >= 0:
                              inner2, c2 = extract_balanced(src, close+1+nb)
                              if c2 > 0: inner = inner2
                      for k in top_level_keys(inner):
                          if k not in fmap[model]:
                              bad.append((f, model, '$fillable missing', k))
                          if k not in cmap[table_for[model]]:
                              bad.append((f, model, 'migration missing', k))

              for pat, model_for in [(r'->items\(\)->create\s*\(', 'CartItem'),
                                     (r'->customizationFields\(\)->create\s*\(', 'ProductCustomizationField')]:
                  for m in re.finditer(pat, src):
                      after = src[m.end():]; bi = after.find('[')
                      if bi < 0: continue
                      inner, close = extract_balanced(src, m.end() + bi)
                      if close < 0: continue
                      for k in top_level_keys(inner):
                          if k not in fmap[model_for]: bad.append((f, model_for+' (relation)', '$fillable missing', k))
                          if k not in cmap[table_for[model_for]]: bad.append((f, model_for+' (relation)', 'migration missing', k))

              for m in re.finditer(r'->customizationFields\(\)->createMany\s*\(', src):
                  after = src[m.end():]; bi = after.find('[')
                  if bi < 0: continue
                  outer, close = extract_balanced(src, m.end() + bi)
                  if close < 0: continue
                  i = 0
                  while i < len(outer):
                      if outer[i] == '[':
                          sub, se = extract_balanced(outer, i)
                          if se > 0:
                              for k in top_level_keys(sub):
                                  if k not in fmap['ProductCustomizationField']: bad.append((f, 'ProductCustomizationField (createMany)', '$fillable missing', k))
                                  if k not in cmap['product_customization_fields']: bad.append((f, 'ProductCustomizationField (createMany)', 'migration missing', k))
                              i = se + 1; continue
                      i += 1

          if bad:
              print(f"::error::Phase 7 v7.1 pre-flight FAILED — {len(bad)} write-path key(s) missing from $fillable or migration:")
              for b in bad: print(f"::error file={b[0]}::{b[1]}  →  {b[2]}: '{b[3]}'")
              sys.exit(1)
          print("✓ Phase 7 v7.1 pre-flight CLEAN — every write-path key is in $fillable AND in a migration column.")
          PY

      - name: Phase 7 v7.1 — explicit migrate:fresh --seed (proves runtime success of v7.0 bug fix)
        env:
          APP_ENV: local
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_DATABASE: marketplace_testing
          DB_USERNAME: marketplace
          DB_PASSWORD: secret
          REDIS_HOST: 127.0.0.1
        run: |
          set -e
          # v7.0 hit "Column not found: 1054 Unknown column 'fulfillment_type'".
          # This step asserts migrate:fresh --seed runs to green AND that the
          # specific column the developer reported missing is actually present
          # in the products table and not under the wrong name.
          echo "== v7.1 sub-check: php artisan migrate:fresh --seed --force must complete without SQL errors ==" >&2
          OUT=$(php artisan migrate:fresh --seed --force 2>&1)
          EXITCODE=$?
          if [ $EXITCODE -ne 0 ]; then
              echo "v7.1 FAIL — migrate:fresh --seed --force exited $EXITCODE" >&2
