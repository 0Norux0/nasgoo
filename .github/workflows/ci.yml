          )
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔎 Phase 4 per-area test verdict" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test file | Audit item | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
          for entry in "${files[@]}"; do
            file="${entry%%|*}"
            label="${entry#*|}"
            output=$(php artisan test --without-tty --filter "$(basename "$file" .php)" 2>&1 | tail -3)
            if echo "$output" | grep -qE "Tests:.*passed"; then
              echo "| \`$(basename "$file")\` | $label | ✅ |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| \`$(basename "$file")\` | $label | ❌ |" >> $GITHUB_STEP_SUMMARY
            fi
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          set -e

      - name: ✅ Laravel summary
        if: always()
        run: |
          echo "### 🐘 Laravel Job" >> $GITHUB_STEP_SUMMARY
          echo "- composer install: ${{ job.status == 'success' && '✅' || '❌' }}" >> $GITHUB_STEP_SUMMARY
          echo "- migrations: ${{ job.status == 'success' && '✅' || '❌' }}" >> $GITHUB_STEP_SUMMARY
          echo "- seeders (roles + permissions + currencies + settings + templates): ${{ job.status == 'success' && '✅' || '❌' }}" >> $GITHUB_STEP_SUMMARY
          echo "- pint (code style): ${{ job.status == 'success' && '✅' || '❌' }}" >> $GITHUB_STEP_SUMMARY
          echo "- tests (Pest): ${{ job.status == 'success' && '✅' || '❌' }}" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════
  # JOB 2 — Frontend (TS + ESLint + Build)
  # Equivalent to: make lint + make typecheck + npm run build
  # ════════════════════════════════════════════════════════════════
  frontend:
    name: ⚛️ Frontend (make lint + make typecheck + build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: |
          if [ -f package-lock.json ]; then
            echo "→ Using committed package-lock.json (npm ci)"
            npm ci
          else
            echo "::warning::package-lock.json missing — running npm install."
            echo "After CI succeeds, run the 'Generate Lock Files' workflow once."
            npm install
          fi

      - name: Run typecheck (make typecheck)
        run: npm run typecheck

      - name: Run lint (make lint)
        run: npm run lint

      - name: Run build
        run: npm run build

      - name: Phase 7 v7.7 — no unused TypeScript imports / locals / parameters (prevents v7.6 TS6133 bug class)
        run: |
          # ROOT CAUSE (v7.6 dev report): npm run build failed with
          #   resources/js/Pages/Orders/Show.tsx:1:16 - error TS6133:
          #   'router' is declared but its value is never read.
          #
          # The existing `npm run typecheck` step above would have caught
          # this — but the developer hit it locally before CI ran on the
          # shipped archive. v7.7 adds this Phase 7-tagged sub-check that
          # runs tsc explicitly AFTER the build, parses the output, and
          # fails with a Phase 7 v7.7-specific actionable message listing
          # EVERY unused-identifier site (TS6133 + TS6196). This makes the
          # failure surface as a Phase 7 v7.7 banner instead of a generic
          # tsc dump, so future regressions are immediately traceable.
          set +e
          npx tsc --noEmit 2>&1 > /tmp/v77-tsc.log
          TSC_EXIT=$?
          set -e

          # Count unused-identifier errors specifically
          TS6133_COUNT=$(grep -cE "error TS6133" /tmp/v77-tsc.log || echo 0)
          TS6196_COUNT=$(grep -cE "error TS6196" /tmp/v77-tsc.log || echo 0)

          if [ "$TS6133_COUNT" -gt "0" ] || [ "$TS6196_COUNT" -gt "0" ]; then
              echo "::error::Phase 7 v7.7 unused-identifier check FAILED — TS6133=$TS6133_COUNT, TS6196=$TS6196_COUNT"
              echo "::error::This is the same bug class the developer reported for v7.6 (Orders/Show.tsx had an unused 'router' import)."
              echo ""
              echo "Unused identifiers (TS6133):"
              grep -E "error TS6133" /tmp/v77-tsc.log | while read -r line; do
                  echo "::error file=$(echo "$line" | sed 's/(.*//')::${line#*error TS6133: }"
              done
              echo ""
              echo "Unused types (TS6196):"
              grep -E "error TS6196" /tmp/v77-tsc.log | while read -r line; do
                  echo "::error file=$(echo "$line" | sed 's/(.*//')::${line#*error TS6196: }"
              done
              exit 1
          fi

          if [ "$TSC_EXIT" -ne "0" ]; then
              # No TS6133/TS6196 but tsc failed for some OTHER reason — that's
              # also a build break we shouldn't let through. Show the first 20
              # lines of tsc output so the cause is visible.
              echo "::error::Phase 7 v7.7: tsc failed (exit $TSC_EXIT) with non-TS6133 errors:"
              head -20 /tmp/v77-tsc.log
              exit 1
          fi

          echo "v7.7 OK — npm run build clean + tsc finds 0 unused imports/locals/parameters/types ✓"

      - name: Phase 6 v7.3 — every usePage<X>() in Phase 6 React pages must use SharedProps
        run: |
          # ROOT CAUSE (v7.2 dev report): Phase 6 React pages used local
          # `interface PageProps { ... }` and passed them as the generic to
          # `usePage<PageProps>()`. Inertia v2's generic is constrained to
          # `T extends import('@inertiajs/core').PageProps` which is
          # augmented in resources/js/types/inertia.d.ts to extend
          # SharedProps (app/marketplace/auth/translations/cart_summary).
          # Local types that didn't include those fields failed compile with
          # TS2344 "Type 'PageProps' does not satisfy the constraint 'PageProps'".
          #
          # This sub-check is BELT-AND-SUSPENDERS on top of the prior
          # `npm run typecheck` step — typecheck WOULD have caught it
          # (and on v7.2 push, it did). This focused check exists so the
          # failure is specific to Phase 6 and points the developer at the
          # exact pattern violation BEFORE the noise of a full tsc trace.
          #
          # Phase 7 v8.0 — extended to also scan
          #   resources/js/Pages/Vendor/Customization/**
          #   resources/js/Components/Customization/**
          # so the same SharedProps rule is enforced for the customizable
          # products React work.
          python3 << 'PY'
          import re, sys
          from pathlib import Path

          def find_type_definition(src, type_name):
              m = re.search(rf'interface\s+{type_name}\s*(?:extends\s+([^\{{]+))?\s*\{{', src)
              if m:
                  return f"interface {type_name} extends {m.group(1).strip()}" if m.group(1) else f"interface {type_name}"
              m = re.search(rf'type\s+{type_name}\s*=\s*([^;]+);', src)
              if m:
                  return f"type {type_name} = {m.group(1).strip()}"
              return None

          errors = []
          # Phase 6 paths (original v7.3 scope) + Phase 7 paths
          scan = list(Path('resources/js/Pages/Vendor/Supplier').rglob('*.tsx'))
          scan += list(Path('resources/js/Pages/Vendor/Customization').rglob('*.tsx'))
          scan += list(Path('resources/js/Components/Customization').rglob('*.tsx'))
          if not scan:
              print("::error::No Phase 6/7 React files found")
              sys.exit(1)

          usepage_calls = 0
          for f in scan:
              src = f.read_text()
              for m in re.finditer(r'usePage<([^>]+)>\(\)', src):
                  usepage_calls += 1
                  generic = m.group(1).strip()
                  if 'SharedProps' in generic:
                      continue
                  local_def = find_type_definition(src, generic)
                  if local_def and 'SharedProps' in local_def:
                      continue
                  errors.append((str(f), generic, local_def or '(undefined)'))

          for f in scan:
              src = f.read_text()
              for shadow in ['PageProps', 'FlashProps']:
                  for kind in ['interface', 'type']:
                      if re.search(rf'\b{kind}\s+{shadow}\b', src):
                          errors.append((str(f), f'local {kind} {shadow}', 'BANNED — shadows the augmented global'))

          if errors:
              print("::error::Phase 6/7 React-quality check FAILED — usePage<>/local-name violations:")
              for f, g, d in errors:
                  print(f"::error file={f}::usePage<{g}>  →  def: {d}")
              sys.exit(1)

          print(f"✓ All {usepage_calls} usePage<>() generics in {len(scan)} Phase 6/7 files use SharedProps; no local PageProps/FlashProps shadowing.")
          PY

      - name: ✅ v3.1 — Verify Vite manifest was written
        run: |
          if [ ! -f public/build/manifest.json ]; then
            echo "::error::public/build/manifest.json is missing after \`npm run build\`."
            echo "::error::This means @vite() directives in Blade cannot resolve asset URLs and the entire UI will be unstyled."
            ls -la public/build/ 2>/dev/null || echo "(public/build/ does not exist at all)"
            exit 1
          fi
          echo "✓ public/build/manifest.json exists ($(wc -c < public/build/manifest.json) bytes)"
          echo "✓ Entries indexed: $(python3 -c "import json;print(len(json.load(open('public/build/manifest.json'))))")"
          # Spot-check that the two declared inputs are present
          python3 -c "
          import json, sys
          m = json.load(open('public/build/manifest.json'))
          required = ['resources/css/app.css', 'resources/js/app.tsx']
          for k in required:
              if k not in m:
                  print(f'::error::Vite manifest is missing required entry {k!r}')
                  sys.exit(1)
              print(f'  ✓ {k} → {m[k][\"file\"]}')
          "

      - name: ✅ Frontend summary
        if: always()
        run: |
          echo "### ⚛️ Frontend Job" >> $GITHUB_STEP_SUMMARY
          echo "- npm install: ${{ job.status == 'success' && '✅' || '❌' }}" >> $GITHUB_STEP_SUMMARY
          echo "- typecheck (tsc --noEmit): ${{ job.status == 'success' && '✅' || '❌' }}" >> $GITHUB_STEP_SUMMARY
          echo "- lint (ESLint): ${{ job.status == 'success' && '✅' || '❌' }}" >> $GITHUB_STEP_SUMMARY
          echo "- build (Vite): ${{ job.status == 'success' && '✅' || '❌' }}" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════
  # JOB 3 — Docker image build
  # Equivalent to: docker compose build
  # ════════════════════════════════════════════════════════════════
  docker:
    name: 🐳 Docker image build
    runs-on: ubuntu-latest
    needs: [laravel, frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: app
          push: false
          load: true
          tags: marketplace:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: ✅ Docker summary
        if: always()
        run: |
          echo "### 🐳 Docker Job" >> $GITHUB_STEP_SUMMARY
          echo "- production image build: ${{ job.status == 'success' && '✅' || '❌' }}" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════
  # JOB 4 — Final Phase 2 verdict
  # ════════════════════════════════════════════════════════════════
  phase-2-verdict:
    name: 🎯 Phase 2 Verdict
    runs-on: ubuntu-latest
    needs: [laravel, frontend, docker]
    if: always()

    steps:
      - name: Compute verdict
        run: |
          LARAVEL='${{ needs.laravel.result }}'
          FRONTEND='${{ needs.frontend.result }}'
          DOCKER='${{ needs.docker.result }}'

          echo "## 🎯 Phase 11B.4 v11B.4.3 Verification Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 🐘 Laravel (install + migrate + seed + vendor-package + categories/attrs + payment-methods + 222 PHPUnit scenarios) | $LARAVEL |" >> $GITHUB_STEP_SUMMARY
          echo "| ⚛️ Frontend (lint + typecheck + Vite build) | $FRONTEND |" >> $GITHUB_STEP_SUMMARY
          echo "| 🐳 Docker image build | $DOCKER |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Phase 4 audit-item coverage map" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| # | Area | Covered by |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 1 | Cart add/update/remove | CartTest (10) + Phase4HttpFlowTest item-1 (7) |" >> $GITHUB_STEP_SUMMARY
          echo "| 2 | Checkout page loading | Phase4HttpFlowTest item-2 (3) |" >> $GITHUB_STEP_SUMMARY
          echo "| 3 | COD order creation | CheckoutTest + PaymentTest + Phase4HttpFlowTest item-3 (1) |" >> $GITHUB_STEP_SUMMARY
          echo "| 4 | Manual bank transfer | PaymentTest + Phase4HttpFlowTest item-4 (1) |" >> $GITHUB_STEP_SUMMARY
          echo "| 5 | Mock online payment | PaymentTest + Phase4HttpFlowTest item-5 (1) |" >> $GITHUB_STEP_SUMMARY
          echo "| 6 | Customer order list + detail | Phase4HttpFlowTest item-6 (4) |" >> $GITHUB_STEP_SUMMARY
          echo "| 7 | Order lifecycle (admin actions) | OrderLifecycleTest (7) + Phase4HttpFlowTest item-7 (3) |" >> $GITHUB_STEP_SUMMARY
          echo "| 8 | Vendor order listing + ship | VendorOrderAccessTest + Phase4HttpFlowTest item-8 (4) |" >> $GITHUB_STEP_SUMMARY
          echo "| 9 | Stock decrease on placement | CheckoutTest + Phase4HttpFlowTest item-9 (1) |" >> $GITHUB_STEP_SUMMARY
          echo "| 10 | Stock restoration on cancel | OrderLifecycleTest + Phase4HttpFlowTest item-7 |" >> $GITHUB_STEP_SUMMARY
          echo "| 11 | Payment method seeding | PaymentMethodsSeederTest (7) + tinker smoke |" >> $GITHUB_STEP_SUMMARY
          echo "| 12 | No 419 errors | Phase4CsrfTest (5) |" >> $GITHUB_STEP_SUMMARY
          echo "| 13 | Filament/admin assets loading | AdminAssetsRegressionTest (6) + asset CI checks |" >> $GITHUB_STEP_SUMMARY
          echo "| 14 | Vite build + frontend typecheck | Frontend job (tsc + vite build) |" >> $GITHUB_STEP_SUMMARY
          echo "| 🩹 | **v5.2 address schema regression** | **CheckoutAddressSchemaTest (9) — proves /checkout opens with no SQL error, addresses table column list pinned, COD + manual_transfer + online_mock end-to-end** |" >> $GITHUB_STEP_SUMMARY
          echo "| 🩹 | **v5.3 controller return-type regression** | **ControllerReturnTypeRegressionTest (9) — proves /checkout returns 200 not 500 (TypeError gone), every Inertia-returning method has a compatible return type, all three payment providers exercised via real HTTP** |" >> $GITHUB_STEP_SUMMARY
          echo "| 🩹 | **v5.3 demo data for migrate:fresh --seed** | **DemoSeederTest (11) — admin/staff/customer/vendor accounts, vendor approved with active subscription + 3 cart-ready products, customer has Phase 1 default address, COD checkout works on demo data, idempotent** |" >> $GITHUB_STEP_SUMMARY
          echo "| 🩹 | **v5.4 Filament closure fix** | **FilamentClosureRegressionTest (3) — static scan: no untyped/unrecognized closure params anywhere in app/Filament; VendorSubscriptions + CommissionRules lists render without the \$s error** |" >> $GITHUB_STEP_SUMMARY
          echo "| 🩹 | **v5.4 product images** | **ProductImageTest (9) — vendor upload lands on public disk, url accessor returns /storage path, listing + detail emit image URLs, JPG/PNG/WEBP + 5MB validation; demo products seeded with images verified on disk in the seed step** |" >> $GITHUB_STEP_SUMMARY
          echo "| 🩹 | **v5.4 Place Order** | **PlaceOrderFlowTest (9) — COD/BankTransfer/MockOnline order creation, validation errors visible when data missing, cart clears, stock decreases, order visible to customer + vendor + admin** |" >> $GITHUB_STEP_SUMMARY
          echo "| 🩹 | **v5.5 authorize() trait** | **AuthorizationRegressionTest (9) — base Controller uses AuthorizesRequests, exact screenshot path /orders/{id}/confirm returns 200 (was 500), policies enforce ownership for customer/vendor/admin** |" >> $GITHUB_STEP_SUMMARY
          echo "| 🩹 | **v5.6 lazy-loading + image perms** | **LazyLoadingRegressionTest (7) + the `v5.6 — public-disk uploads are world-readable + no 403` CI step — ViewOrder/EditOrder resolveRecord eager-loads items/shippingAddress/payments, OrderLifecycleService loadMissing defensively, /orders/{id} + /orders/{id}/confirm + /vendor/orders/{id} render with strict-mode lazy-loading prevention enabled, uploaded files land on the public disk with world-readable perms** |" >> $GITHUB_STEP_SUMMARY
          echo "| 🩹 | **v5.7 multi-product checkout** | **MultiProductCheckoutTest (9) — single/multi-same-vendor/multi-different-vendor Place Order under \`Model::shouldBeStrict(true)\` without product->vendor lazy-load crash; cart + checkout pages render with multi-item carts; cancel restocks all lines; vendor sees only their own items on a multi-vendor order; demo data includes second approved vendor (Coastal Goods) for multi-vendor scenario testing** |" >> $GITHUB_STEP_SUMMARY
          echo "| 🩹 | **v5.8 multi-product checkout (demo path)** | **MultiProductCheckoutDemoTest (6) + new CI step v5.8 — runs the actual DemoSeeder then places a 2-product COD order as customer@marketplace.test under strict mode; reproduces the developer reported flow exactly. CheckoutService uses load() not loadMissing, per-iteration defensive loadMissing inside the snapshot loop, and CommissionResolver::forProduct also defensively loadMissing — belt-and-suspenders against any upstream path that returns a partially-loaded cart** |" >> $GITHUB_STEP_SUMMARY
          echo "| 🆕 | **Phase 5: reviews + wishlist + payouts + shipping** | **ProductReviewTest (10) + WishlistTest (7) + VendorPayoutTest (10) + ShippingTest (11) — verified-purchase review submission, pending → admin moderation workflow, rating_avg/rating_count rollup, wishlist add/remove with dedup + guest redirect, vendor wallet balance breakdown (in_escrow/releasing/released), payout request validates against available balance (no double-spend), admin approve/reject/markPaid with audit logs, shipping zone country+region matching, method types (flat/free/pickup) with eligibility rules, checkout snapshots shipping_method_id + name + fee on the order. Demo data ready immediately: 1 delivered order, 1 approved review, 2 wishlist items, 1 pending payout request, 2 zones with 4 methods** |" >> $GITHUB_STEP_SUMMARY
          echo "| 🩹 | **v6.1 navigation + lazy-load fixes** | **Phase5V61RegressionTest (16) — Wishlist menu link surfaces via auth.user shared prop for logged-in customers; VendorLayout shows Reviews/Wallet/Payouts only when auth.user.vendor_status === approved; /vendor/payouts alias for the wallet page so the sidebar link works; OrderController::confirm now eager-loads events.actor (fixes lazy-load crash on online/card payment confirmation — same root pattern as the v5.x Product->vendor bug, different relation); admin ViewOrder page exposes Confirm/Ship/Deliver/COD-capture/Transfer-confirm/Cancel/Refund header actions (mirrors row actions); pending/rejected/suspended vendors bounced from /vendor/wallet, /vendor/payouts, /vendor/reviews to /vendor dashboard** |" >> $GITHUB_STEP_SUMMARY
          echo "| 🩹 | **v6.2 EditOrder actions + demo data positive available balance** | **Phase5V62RegressionTest (9) + new CI step `v6.2 — admin order EditOrder header actions + full payout E2E flow`. EditOrder now exposes the same 7 lifecycle actions as ViewOrder so admins opening /admin/orders/{id}/edit see Confirm/Ship/Deliver/Cancel/Refund/COD-capture/Transfer-confirm. DemoSeeder now produces THREE delivered orders (mixed quantities/dates) so released earnings comfortably exceed the seeded payout reservation (which v6.2 caps at 2 KWD, was up to 5 KWD). Vendor wallet `available_balance_minor > 0` is guaranteed after migrate:fresh --seed so the payout form is reachable. Wallet UI now ALWAYS shows the request section: when balance is zero, an amber explanation panel shows the in-escrow/releasing/reserved breakdown + the 3-step release sequence; when positive, the form opens via New request as before. New CI step runs the full payout E2E: vendor submits → admin approves → admin marks paid → wallet paid_out updates → audit log captures all three transitions** |" >> $GITHUB_STEP_SUMMARY
          echo "| 🚨 | **v6.3 permission seeder + actionable demo orders** | **Phase5V63RegressionTest (11) + new CI step `v6.3 — migrate:fresh --seed succeeds + permissions registered + actionable demo orders exist`. ROOT CAUSE: permissionCatalogue() had PHP duplicate array keys for products and orders. Later definitions silently overwrote earlier ones, so orders.confirm/ship/deliver/cancel/refund + payments.capture/refund were never registered as permissions. Two effects: (1) Role::syncPermissions blew up when assigning these to the vendor role → migrate:fresh --seed failed entirely. (2) Even when seeding succeeded historically, super_admin user->can(orders.confirm) returned false at runtime because the permission did not exist → Filament action ->visible() predicates returned false → buttons silently hidden. v6.3 merges the duplicate keys so every permission referenced by ->can() is registered. DemoSeeder now ALSO seeds 4 actionable orders (paid, confirmed, shipped, COD-pending) so admin sees Confirm/Ship/Deliver/Mark-COD-paid buttons immediately after seed.** |" >> $GITHUB_STEP_SUMMARY
          echo "| 🩹 | **v6.4 admin orders eager-load completeness** | **Phase5V64RegressionTest (8) + new CI step `v6.4 — admin order pages open under strict mode (no lazy-load)`. ROOT CAUSE: OrderResource::getEloquentQuery() eager-loaded [items, shippingAddress, payments] but NOT latestPayment. latestPayment is a separate HasOne+latestOfMany relation — loading payments does not cover it. Every table row evaluates COD-capture / Transfer-confirm / Refund action visibility predicates that read \$record->latestPayment?->method_slug; under Model::shouldBeStrict() (enabled in non-production by AppServiceProvider) this throws "Attempted to lazy load [latestPayment]" on multi-row tables. v6.4 expands the eager-load to [user, items, shippingAddress, addresses, payments, latestPayment, shippingMethod, events.actor] — covers every \$record->X access in OrderResource + ViewOrder + EditOrder. Python static cross-reference test asserts all admin closure relation accesses are eager-loaded. VendorOrderController::show also eager-loads events.actor for defensive coverage (same risk class as v6.1 OrderController fix). New CI step runs a real GET /admin/orders + GET /admin/orders/{id}/edit + GET /admin/orders/{id} via the HTTP kernel under strict mode — any lazy-load returns 500.** |" >> $GITHUB_STEP_SUMMARY
          echo "| 🚀 | **Phase 6 — Dropshipping / Supplier Product Import** | **Phase6DropshippingTest (23) + new CI step `Phase 6 — supplier platforms, integrations, imports, and dropship checkout end-to-end`. 7 new tables (supplier_platforms, supplier_integrations, supplier_products, supplier_orders, supplier_order_events, supplier_product_imports + columns added to products + order_items). 5 new models. 4 Filament admin resources (Platforms, Integrations, Products, Orders). 3 vendor controllers (Integrations, Products, Orders). 7 React pages. 4 new permission modules (supplier_platforms, supplier_integrations, supplier_products, supplier_orders — 13 permissions; added as distinct top-level catalogue keys to avoid the v6.3 duplicate-array-key bug class). Importer supports manual entry, CSV with header row, dry-run validation, per-row error report. SupplierProductMapper enforces price >= cost and walks supplier_product pending → mapped → published. DropshipOrderCreator groups dropship items by (vendor, platform) into one supplier_order per group with cost snapshot + audit event. CheckoutService integrated. Compliance: NO scraping. Manual + CSV + URL reference + API-ready foundation only. DemoSeeder produces 7 platforms + 1 vendor integration + 3 supplier products (pending/mapped/published) + 1 dropshipping customer order + 1 auto-created supplier_order so the vendor can test the status flow immediately.** |" >> $GITHUB_STEP_SUMMARY
          echo "| 🩹 | **Phase 6 setup + frontend hardening (v7.1 → v7.2 → v7.3)** | **v7.1**: APP_KEY pre-seed guard in DemoSeeder — clear RuntimeException before any encrypted write. **v7.2**: new `php artisan marketplace:setup-demo` guided command (`.env` check → key:generate → optimize:clear → migrate:fresh --seed → demo logins); `bootstrap/app.php` explicit `->withCommands([app/Console/Commands])`. **v7.3**: Phase 6 React `usePage<X>()` generics use canonical `SharedProps` from `@/types/inertia` (the augmented `@inertiajs/core` PageProps), fixing TS2344 generic-constraint errors that broke `npm run build` for the developer. All 7 usePage<>() calls in 8 Phase 6 React files now use SharedProps directly or via `SharedProps & ...`; local `interface PageProps` / `interface FlashProps` in function-arg-only files were renamed to page-specific names (`SupplierProductsPageProps`, `SupplierIntegrationsPageProps`, `SupplierOrdersIndexProps`, `CsvImportPageProps`, `ManualPageProps`, `MapPageProps`) so they cannot shadow the augmented global. New Phase 6 v7.3 sub-check inside the frontend job (after `npm run build`) asserts the pattern is preserved — fails loud with a Phase 6-specific message if any future change reintroduces local `PageProps`/`FlashProps` shadowing.** |" >> $GITHUB_STEP_SUMMARY
          echo "| 🆕 | **Phase 7 — Customizable products / Print-on-demand foundation** | New product type `custom`; vendor field builder (9 field types: image / text / textarea / color / font / placement / dropdown / size / checkbox); customer customization form with secure file uploads on the **private** disk (random filenames, MIME-vs-extension safety check); cart never merges customized lines; checkout snapshots customization data into immutable `order_item_customizations` + freezes `customization_fee_minor`; vendor proof workflow (upload → send → customer approve/reject) with `order_items.customization_status` state machine. 2 admin Filament resources + 4 customer/vendor controllers + 11 routes + 1 React component + 1 vendor field-builder page + extensions to Catalog/Show, Cart/Show, Orders/Show, Vendor/Orders/Show, Vendor/Products/Index. 22 Pest scenarios; demo seeds a customizable mug + T-shirt + a sample customer order with a SENT proof for the demo customer to test approve/reject immediately. Files stored on `local` (private) disk only — never exposed at `/storage/*` (CI sub-check 4 verifies HTTP 404). All Phase 7 React pages use `SharedProps` from `@/types/inertia` (v7.3 pattern continues).** |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$LARAVEL" = "success" ] && [ "$FRONTEND" = "success" ] && [ "$DOCKER" = "success" ]; then
            echo "### ✅ Phase 10 v10.15 PASSES — ready for final deployment review" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "All 14 developer-requested audit items are covered. See the per-area mapping above for the test file(s) that prove each one." >> $GITHUB_STEP_SUMMARY
            exit 0
          else
            echo "### ❌ Phase 4 FAILED — see job logs for details" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Click the failed job above and expand the failing step to see the exact error." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Failing job(s):** Laravel=$LARAVEL, Frontend=$FRONTEND, Docker=$DOCKER" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
