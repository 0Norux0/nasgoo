      - name: Phase 8 v8.7 — controller return type covers Inertia::render (any method returning Inertia::render must have a type that includes Inertia\Response)
        run: |
          # ROOT CAUSE (v8.6 → v8.7): CatalogController::show was typed as
          # \Symfony\Component\HttpFoundation\Response in v8.1 (when I added
          # the service-slug redirect, thinking that type was a superclass
          # of both branches). It IS the superclass of RedirectResponse but
          # NOT of Inertia\Response — Inertia\Response implements
          # Responsable, it does not extend Symfony\HttpFoundation\Response.
          # So `return Inertia::render(...)` raised:
          #
          #   TypeError: Return value must be of type Symfony\...\Response,
          #              Inertia\Response returned
          #
          # The v5.3 ControllerReturnTypeRegressionTest was targeted only at
          # CheckoutController::show — it didn't generalize to detect the
          # same class of bug in other controllers. This v8.7 sub-check
          # generalizes: it scans EVERY controller method that returns
          # `Inertia::render(...)` or `inertia(...)` and verifies the return
          # type (after resolving `use` import aliases) includes either
          # Inertia\Response, mixed, or a union containing one of those.
          #
          # Stub-independent — pure Python regex against source. Runs in
          # under a second on any runner.
          python3 << 'PY'
          import re, sys
          from pathlib import Path

          USE_RE = re.compile(r"^use\s+([\\\w]+)(?:\s+as\s+(\w+))?\s*;", re.MULTILINE)
          FN_RE  = re.compile(
              r"public\s+function\s+(\w+)\s*\([^)]*\)\s*:\s*([?\\\w]+(?:\s*\|\s*[?\\\w]+)*)\s*\{",
              re.MULTILINE
          )

          bugs = []
          checked = 0

          for ctrl in sorted(Path('app/Http/Controllers').rglob('*.php')):
              src = ctrl.read_text()

              # Build alias → FQN map from `use` statements
              aliases = {}
              for m in USE_RE.finditer(src):
                  alias = m.group(2) or m.group(1).split('\\')[-1]
                  aliases[alias] = m.group(1)

              for m in FN_RE.finditer(src):
                  fn_name = m.group(1)
                  ret_raw = m.group(2).strip()

                  # Pull method body (matching-brace scan)
                  body_start = m.end(); depth = 1; i = body_start
                  while i < len(src) and depth > 0:
                      if src[i] == '{': depth += 1
                      elif src[i] == '}': depth -= 1
                      i += 1
                  body = src[body_start:i]

                  if 'Inertia::render' not in body and 'inertia(' not in body:
                      continue
                  checked += 1

                  # Resolve each part of the return type via `use` aliases
                  parts = [p.strip().lstrip('?').lstrip('\\') for p in ret_raw.split('|')]
                  resolved = [r if '\\' in r else aliases.get(r, r) for r in parts]

                  # OK if any part resolves to Inertia\Response (or `mixed`)
                  ok = any(
                      r == 'Inertia\\Response' or r.endswith('Inertia\\Response') or r == 'mixed'
                      for r in resolved
                  )
                  if not ok:
                      # Line number for CI annotation
                      line = src[:m.start()].count('\n') + 1
                      bugs.append((str(ctrl), line, fn_name, ret_raw, resolved))

          if bugs:
              print(f"::error::Phase 8 v8.7 controller-return-type check FAILED — {len(bugs)} method(s) return Inertia::render but their declared type excludes Inertia\\Response:")
              for path, line, fn, raw, resolved in bugs:
                  print(f"::error file={path},line={line}::{fn}() declared as `{raw}` (resolves to {resolved}) but returns Inertia::render()")
                  print(f"::error::  Fix: change the return type to `Inertia\\Response` or `Inertia\\Response | RedirectResponse` if the method also redirects.")
              sys.exit(1)

          print(f"✓ Phase 8 v8.7 controller-return-type check: scanned {checked} Inertia::render-returning methods, all have compatible return types.")
          PY

