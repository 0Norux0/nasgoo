      - name: Phase 9 v9.3 — Coupon allocation reconciliation invariant (sum-allocation == coupon-discount)
        run: |
          # This is the financial reconciliation invariant: for every order
          # with a coupon, sum(order_items.coupon_allocation_minor) MUST
          # equal orders.coupon_discount_minor, AND sum(vendor_earning +
          # commission) MUST equal subtotal − coupon_discount. Without this
          # invariant, marketplace pays out more than it collected (or less,
          # punishing vendors). Asserted post-seed.
          php artisan migrate:fresh --seed --quiet 2>&1 | tail -5
          php artisan tinker --execute="
            \$violations = \\App\\Models\\Order::query()
                ->whereNotNull('coupon_id')
                ->get()
                ->filter(function (\$o) {
                    \$sumAlloc = \$o->items->sum('coupon_allocation_minor');
                    \$sumPay   = \$o->items->sum('vendor_earning_minor') + \$o->items->sum('commission_amount_minor');
                    \$net      = \$o->subtotal_minor - \$o->coupon_discount_minor;
                    return \$sumAlloc !== (int) \$o->coupon_discount_minor || \$sumPay !== \$net;
                });
            if (\$violations->isNotEmpty()) {
                foreach (\$violations as \$o) {
                    echo \"::error::Order \" . \$o->number . \" reconciliation FAILED — alloc_sum=\" .
                        \$o->items->sum('coupon_allocation_minor') . \" coupon=\" . \$o->coupon_discount_minor .
                        \" pay_sum=\" . (\$o->items->sum('vendor_earning_minor') + \$o->items->sum('commission_amount_minor')) .
                        \" net=\" . (\$o->subtotal_minor - \$o->coupon_discount_minor) . \"\\n\";
                }
                exit(1);
            }
            echo \"OK — \" . \\App\\Models\\Order::whereNotNull('coupon_id')->count() . \" coupon orders, all reconcile\\n\";
          "

