                fwrite(STDERR, 'v7.1 FAIL — integration->credentials cast did not return an array.'.PHP_EOL); exit(1);
            }
            echo 'v7.1 sub-check 4: encrypted credentials round-trip correctly via the cast ✓'.PHP_EOL;
          "

          echo "== v7.1 sub-check 5: CI uses the correct command 'php artisan migrate:fresh --seed' (no typo) ==" >&2
          # Match only the actual broken command form: `php artisan migrate:fresh --seed.`
          # followed by whitespace or end of line. We deliberately do NOT match the
          # period-as-punctuation case ("after migrate:fresh --seed.") nor quoted
          # self-references (the v7.1 step's own error message). Quoting and a
