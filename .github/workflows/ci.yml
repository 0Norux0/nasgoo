            \$vendorUser = \App\Models\User::where('email', 'vendor@marketplace.test')->firstOrFail();

            \$svc->transition(\$so, 'placed', \$vendorUser->id, 'vendor', 'CI test placement');
            \$svc->transition(\$so->fresh(), 'shipped', \$vendorUser->id, 'vendor');
            \$svc->transition(\$so->fresh(), 'delivered', \$vendorUser->id, 'vendor');

            \$final = \$so->fresh();
            if (\$final->status !== 'delivered') {
                fwrite(STDERR, 'Phase 6 FAIL — supplier order did not reach delivered.'.PHP_EOL);
                exit(1);
            }
            if (! \$final->placed_at || ! \$final->shipped_at || ! \$final->delivered_at) {
                fwrite(STDERR, 'Phase 6 FAIL — transition timestamps not stamped.'.PHP_EOL);
                exit(1);
            }
            \$events = \$final->events()->whereIn('event_type', ['status.placed','status.shipped','status.delivered'])->count();
            if (\$events < 3) {
                fwrite(STDERR, 'Phase 6 FAIL — expected 3 status events, got '.\$events.PHP_EOL);
                exit(1);
            }
            echo 'Phase 6 step 3: supplier order walked pending → placed → shipped → delivered with full event log ✓'.PHP_EOL;
          "

          echo "== Step 4: vendor /vendor/supplier-products and /vendor/supplier-orders open under strict mode ==" >&2
          php artisan tinker --execute="
            \Illuminate\Database\Eloquent\Model::shouldBeStrict(true);
            \$kernel = app(\Illuminate\Contracts\Http\Kernel::class);
            \$vendorUser = \App\Models\User::where('email', 'vendor@marketplace.test')->firstOrFail();

            foreach (['/vendor/supplier-products', '/vendor/supplier-orders'] as \$url) {
