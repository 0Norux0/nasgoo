      - name: Phase 8 v8.5 — duplicate global test function check (no two test files declare the same top-level function)
        run: |
          # ROOT CAUSE (v8.4 → v8.5): tests/Feature/Phase6DropshippingTest.php
          # and tests/Feature/VendorProductCrudTest.php both declared a top-level
          # `function makeApprovedVendor()` with INCOMPATIBLE signatures (one
          # returned Vendor, the other returned [User, Vendor, VendorPackage]).
          # When PHP loaded both files during `php artisan test`, it hit
          # `PHP Fatal error: Cannot redeclare function makeApprovedVendor()`.
          #
          # This bug had been latent since Phase 6 but only surfaced now because
          # the v8.1/v8.2/v8.3/v8.4 failures earlier in the chain were masking
          # it — the test suite simply never finished loading. After v8.4 fixed
          # the TypeScript build, the test runner reached the duplicate and
          # exploded.
          #
          # v8.5 renames the two helpers (Phase 6 → dropshipVendor, Vendor
          # product CRUD → vendorWithPackage) and adds this static check so
          # any future contributor adding a global `function NAME()` that
          # collides with an existing one across tests/ files fails CI
          # immediately, with file:line annotations on both sites.
          python3 << 'PY'
          import re, sys
          from pathlib import Path
          from collections import defaultdict

          # Top-level function declarations: line starts with `function NAME(`.
          # This regex matches global functions (not class methods, which are
          # indented and preceded by visibility modifiers).
          fn_pattern = re.compile(r"^function\s+(\w+)\s*\(", re.MULTILINE)

          decls = defaultdict(list)
          for f in Path('tests').rglob('*.php'):
              src = f.read_text()
              for m in fn_pattern.finditer(src):
                  decls[m.group(1)].append((str(f), src[:m.start()].count('\n') + 1))

          dups = {name: sites for name, sites in decls.items() if len(sites) > 1}
          if dups:
              print(f"::error::Phase 8 v8.5 duplicate-global-function check FAILED — {len(dups)} name(s) declared in multiple test files:")
              for name, sites in dups.items():
                  print(f"::error::  '{name}()' declared {len(sites)}× in:")
                  for f, l in sites:
                      print(f"::error file={f},line={l}::  duplicate declaration of {name}()")
                  print(f"::error::    Fix: rename one of them, OR extract to a shared trait/helper.")
              sys.exit(1)

          print(f"✓ Phase 8 v8.5 duplicate-global-function check: {len(decls)} unique global test helpers, no duplicates.")
          PY

      - name: Phase 8 v8.4 — form-errors-key static check (every form.errors.KEY maps to a useForm data key)
        run: |
          # ROOT CAUSE (v8.3 → v8.4): two Phase 8 React pages accessed
          # `rescheduleForm.errors.status` and `form.errors.service` even though
          # `status` and `service` are not declared in the corresponding
          # useForm() data objects. Under tsconfig's strict mode + the real
          # Inertia type Partial<Record<keyof TForm, string>>, these emit
          # `TS2339: Property does not exist on type ...` and break
          # `npm run build` for the developer.
          #
          # CI already runs `npm run typecheck` + `npm run build` against real
          # types, which would have caught these. But my own sandbox tsc check
          # used a weakened tsconfig (strict:false) and missed them — so I
          # shipped the bug. This static defense is stub-independent: it greps
          # every `.tsx` file in resources/js/Pages/, finds every useForm({...})
          # declaration, extracts the data keys, then validates every
          # `formVar.errors.KEY` reference against those keys.
          #
          # The defense is intentionally independent of TypeScript / stubs so
          # it works on any runner — and runs in <1s.
          python3 << 'PY'
          import re, sys
          from pathlib import Path

          USE_FORM_RE = re.compile(
              r"const\s+(\w+)\s*=\s*useForm\s*\(\s*\{(?P<body>[^{}]*(?:\{[^{}]*\}[^{}]*)*)\}",
              re.MULTILINE
          )
          ERRORS_ACCESS_RE = re.compile(r"\b(\w+)\.errors\.(\w+)\b")

          issues = []
          checked = 0

          for tsx in Path('resources/js').rglob('*.tsx'):
              src = tsx.read_text()
              forms = {}
              for um in USE_FORM_RE.finditer(src):
                  keys = set(re.findall(r"(?:^|[\s,])(\w+)\s*:", um.group('body')))
                  forms[um.group(1)] = keys
              if not forms: continue
              checked += 1

              for em in ERRORS_ACCESS_RE.finditer(src):
                  var, key = em.group(1), em.group(2)
                  if var not in forms: continue
                  if key not in forms[var]:
                      line = src[:em.start()].count('\n') + 1
                      issues.append((str(tsx), line, var, key, sorted(forms[var])))

          if issues:
              print(f"::error::Phase 8 v8.4 form-errors-key check FAILED — {len(issues)} mismatch(es):")
              for path, line, var, key, valid in issues:
                  print(f"::error file={path},line={line}::{var}.errors.{key} — '{key}' is not declared in {var}'s useForm() data")
                  print(f"::error::  Valid keys: {valid}")
                  print(f"::error::  Fix options:")
                  print(f"::error::    A. Remove the .errors.{key} reference if the backend never sets it.")
                  print(f"::error::    B. Cast {var}.errors to Record<string, string | undefined> for cross-cutting backend error keys that don't map to form fields.")
                  print(f"::error::    C. Add '{key}' to the useForm() data object if it's a real form field.")
              sys.exit(1)
          print(f"✓ Phase 8 v8.4 form-errors-key check: scanned {checked} useForm-using files, all form.errors.KEY references map to declared data keys.")
          PY

      - name: Phase 8 v8.3 — schema-vs-runtime-data pre-flight (validate Product::create/updateOrCreate keys against real columns)
        run: |
          # ROOT CAUSE (v8.2 → v8.3): Phase 8 seeder + VendorServiceController + 2 test files
          # passed `stock_minor` and `manage_stock` as keys to Product::create() / Product::updateOrCreate().
          # Those columns DO NOT EXIST in the products table — the real names are `stock` and `track_stock`.
          # MySQL hard-errored with `SQLSTATE 1054 Unknown column 'stock_minor' in 'INSERT INTO'`.
          #
          # The v7.1 schema-vs-code pre-flight only validates model $fillable arrays against
          # migration columns — it doesn't catch runtime data shapes passed to ::create(...).
          # v8.3 adds this complementary check: parse every Product::create / Product::updateOrCreate
          # / Product::factory()->create call in seeder + controllers + tests, and verify every key
          # exists as a real column in the products table.
          python3 << 'PY'
          import re, sys
          from pathlib import Path

          # --- 1. Read the real products columns from the create migration ---
          products_mig = Path('database/migrations/2026_01_03_000003_create_products_table.php')
          if not products_mig.exists():
              # Search for it (filename might differ slightly)
              candidates = list(Path('database/migrations').glob('*create_products_table.php'))
              if not candidates:
                  print("::error::Cannot find create_products_table migration")
                  sys.exit(1)
              products_mig = candidates[0]

          src = products_mig.read_text()
          # Match: $table->{type}('column_name'...)
          products_cols = set(re.findall(
              r"->(?:string|text|longText|tinyText|integer|unsignedInteger|unsignedSmallInteger|"
              r"unsignedTinyInteger|tinyInteger|smallInteger|bigInteger|boolean|date|time|"
              r"dateTime|datetime|timestamp|json|jsonb|foreignId|decimal|float|softDeletes)"
              r"\(\s*'([a-z_][a-z0-9_]*)'", src
          ))
          products_cols.update({'id', 'created_at', 'updated_at', 'deleted_at'})

          # Columns added by LATER migrations to the products table (Phase 6+, Phase 8)
          for extra_mig in Path('database/migrations').glob('*add*products*'):
              extra = extra_mig.read_text()
              # Match: $table->{type}('col') AND $table->addColumn('type', 'col')
              for m in re.finditer(
                  r"->(?:string|text|longText|integer|unsignedInteger|unsignedSmallInteger|"
                  r"boolean|date|time|datetime|timestamp|json|foreignId|decimal|float)"
                  r"\(\s*'([a-z_][a-z0-9_]*)'", extra):
                  products_cols.add(m.group(1))

          print(f"  Found {len(products_cols)} real columns in products table.")

          # --- 2. Find every Product::create / updateOrCreate / factory call in source ---
          # We scan seeders + controllers + tests (factories ARE allowed to use ANY column
          # since their fluent overrides match the model, but we double-check anyway).
          search_roots = [
              Path('database/seeders'), Path('app/Http/Controllers'),
              Path('tests/Feature'),
          ]

          # Regex: matches `Product::create([...])`, `Product::updateOrCreate([...], [...])`,
          # `Product::factory()->create([...])`. We extract every block in `[]` that follows
          # one of these patterns and pull out the string keys.
          #
          # IMPORTANT: the negative lookbehind `(?<![A-Za-z_])` ensures we match only the
          # `Product` model — NOT `SupplierProduct`, `ProductCustomizationField`, etc.
          # (Those models have their own column sets and are not in scope here.)
          call_re = re.compile(
              r"(?<![A-Za-z_])Product(?:::|->factory\(\)->)(?:create|updateOrCreate|firstOrCreate)\s*\("
              r"\s*\[(?P<block1>[^\[\]]*(?:\[[^\[\]]*\][^\[\]]*)*)\]"            # first array
              r"(?:\s*,\s*\[(?P<block2>[^\[\]]*(?:\[[^\[\]]*\][^\[\]]*)*)\])?",  # optional second array
              re.MULTILINE
          )

          issues = []
          checked_calls = 0

          for root in search_roots:
              if not root.exists(): continue
              for path in root.rglob('*.php'):
                  src = path.read_text()
                  for match in call_re.finditer(src):
                      checked_calls += 1
                      for block in (match.group('block1'), match.group('block2')):
                          if not block: continue
                          # Pull single-quoted keys followed by =>
                          for key_match in re.finditer(r"'([a-z_][a-z0-9_]*)'\s*=>", block):
                              key = key_match.group(1)
                              if key not in products_cols:
                                  # Pinpoint line number
                                  line_num = src[:src.find(match.group(0))].count('\n') + 1
                                  issues.append((str(path), line_num, key))

          if issues:
              print(f"::error::Phase 8 v8.3 schema-vs-runtime-data check FAILED — {len(issues)} bad column reference(s):")
              for path, line, key in issues:
                  print(f"::error file={path},line={line}::'{key}' is not a column in the products table")
              print()
              print("Real columns in products table:")
              for c in sorted(products_cols):
                  print(f"  - {c}")
              sys.exit(1)

          print(f"  ✓ Phase 8 v8.3 schema-vs-runtime-data check: scanned {checked_calls} Product create/update calls — all keys map to real columns.")
          PY

      - name: Phase 8 v8.2 — MySQL identifier-limit pre-flight (predict auto-generated index name lengths)
        run: |
          # ROOT CAUSE (v8.1 → v8.2): MySQL has a 64-char identifier limit;
          # Postgres silently truncates at 63. Phase 8.0/8.1 had 3 compound
          # indexes whose auto-generated names exceeded 64 chars, causing
          # `php artisan migrate:fresh --seed` to hard-fail on MySQL:
          #
          #   service_provider_assignments_service_provider_id_product_id_unique         (66)
          #   service_provider_assignments_product_id_service_provider_id_index          (65)
          #   service_bookings_service_provider_id_booked_for_date_booked_for_time_index (74)
          #
          # CI previously passed because the runtime step uses Postgres,
          # which silently truncated. This static check predicts the names
          # WITHOUT running migrations and fails fast on anything > 60
          # chars (4-char safety buffer under MySQL's 64-char limit).
          # Forces explicit short names on every compound index.
          python3 << 'PY'
          import re, sys
          from pathlib import Path

          LIMIT = 64       # MySQL hard limit
          SOFT  = 60       # CI threshold (safety buffer)

          migrations = sorted(Path('database/migrations').glob('2026_01_08_*.php'))
          problems = []  # (file, name, length, kind)

          for m in migrations:
              src = m.read_text()
              tm = re.search(r"Schema::create\(\s*'([a-z_]+)'", src)
              if not tm: continue
              table = tm.group(1)

              # Implicit foreign keys
              for col in re.findall(r"->foreignId\(\s*'([a-z_]+)'", src):
                  name = f"{table}_{col}_foreign"
                  if len(name) > SOFT: problems.append((m.name, name, len(name), 'foreign'))

              # Compound unique constraints — only flag the IMPLICIT ones
              for um in re.finditer(r"\$table->unique\(\s*\[([^\]]+)\](?:\s*,\s*'([^']+)')?\s*\)", src):
                  explicit = um.group(2)
                  if explicit:
                      if len(explicit) > LIMIT:
                          problems.append((m.name, explicit, len(explicit), 'unique-explicit-TOO-LONG'))
                      continue
                  cols_raw = um.group(1)
                  cols = [c.strip().strip("'") for c in cols_raw.split(',') if c.strip()]
                  name = f"{table}_" + "_".join(cols) + "_unique"
                  if len(name) > SOFT:
                      problems.append((m.name, name, len(name), 'unique-implicit'))

              # Compound indexes
              for im in re.finditer(r"\$table->index\(\s*\[([^\]]+)\](?:\s*,\s*'([^']+)')?\s*\)", src):
                  explicit = im.group(2)
                  if explicit:
                      if len(explicit) > LIMIT:
                          problems.append((m.name, explicit, len(explicit), 'index-explicit-TOO-LONG'))
                      continue
                  cols_raw = im.group(1)
                  cols = [c.strip().strip("'") for c in cols_raw.split(',') if c.strip()]
                  name = f"{table}_" + "_".join(cols) + "_index"
                  if len(name) > SOFT:
                      problems.append((m.name, name, len(name), 'index-implicit'))

              # Single-column indexes
              for im in re.finditer(r"\$table->index\(\s*'([a-z_]+)'\s*\)", src):
                  col = im.group(1)
                  name = f"{table}_{col}_index"
                  if len(name) > SOFT:
                      problems.append((m.name, name, len(name), 'index-single'))

          if problems:
              print(f"::error::Phase 8 v8.2 MySQL identifier-limit check FAILED — {len(problems)} name(s) too long:")
              for f, n, L, k in problems:
                  print(f"::error file={f}::{L} chars [{k}]  {n}")
                  print(f"::error::  Fix: give this index an explicit short name as the second arg to ->{k.split('-')[0]}([...], 'short_name')")
              sys.exit(1)
          print(f"✓ Phase 8 v8.2 MySQL identifier-limit check: all auto-derived identifiers ≤ {SOFT} chars.")
          PY

      - name: Phase 8 v8.2 — MySQL migrate:fresh --seed end-to-end (real MySQL container, not just Postgres)
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: marketplace_mysql_check
          DB_USERNAME: root
          DB_PASSWORD: secret
          MAIL_MAILER: log
          APP_ENV: local
        run: |
          # ROOT CAUSE: v8.1 CI only ran migrate:fresh against Postgres,
          # which silently truncated identifiers > 63 chars. Customer
          # developer was running MySQL locally and hit the 64-char hard
          # limit. This step spins up MySQL alongside the Postgres test
          # DB so the migration set is verified on BOTH engines before
          # we declare Phase 8 v8.2 ready.
          #
          # If MySQL isn't available in the CI matrix (eg. minimal runner),
          # this step gracefully skips; the static identifier-limit
          # pre-flight above is the primary defense.
          set +e
          mysqladmin -h 127.0.0.1 -P 3306 -u root -psecret ping 2>/dev/null
          MYSQL_AVAILABLE=$?
          set -e

          if [ "$MYSQL_AVAILABLE" -ne "0" ]; then
              echo "::warning::MySQL not available on this runner — skipping (static pre-flight is primary defense)"
              exit 0
          fi

          mysql -h 127.0.0.1 -P 3306 -u root -psecret -e "DROP DATABASE IF EXISTS marketplace_mysql_check; CREATE DATABASE marketplace_mysql_check;"
          php artisan migrate:fresh --seed --force 2>&1 | tee /tmp/mysql-migrate.log

          if grep -qE "SQLSTATE.*1059|Identifier name.*too long" /tmp/mysql-migrate.log; then
              echo "::error::Phase 8 v8.2 — MySQL identifier-too-long error in migration output"
              exit 1
          fi
          if grep -qE "SQLSTATE|migration failed" /tmp/mysql-migrate.log; then
              echo "::error::Phase 8 v8.2 — migration error against MySQL"
              exit 1
          fi
          echo "✓ Phase 8 v8.2: migrate:fresh --seed completed successfully against MySQL"

      - name: Phase 8 v8.1 — Pest scenarios for completion suite
        env:
          APP_ENV: local
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_DATABASE: marketplace_testing
          DB_USERNAME: marketplace
          DB_PASSWORD: secret
          REDIS_HOST: 127.0.0.1
          MAIL_MAILER: log
        run: |
          set -e
          OUT=$(php artisan test --filter "Phase 8 v8.1" 2>&1) || EXIT=$?
          echo "$OUT"
          if [ "${EXIT:-0}" -ne "0" ]; then
              echo "::error::Phase 8 v8.1 completion scenarios FAILED"
              exit 1
          fi
          if ! echo "$OUT" | grep -q "Phase 8 v8.1"; then
              echo "::error::Phase 8 v8.1 filter matched no scenarios"
              exit 1
          fi
          echo "✓ Phase 8 v8.1: all 20 completion scenarios green."

      - name: Phase 8 v8.2 — Pest scenarios for index-name regression suite
        env:
          APP_ENV: local
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_DATABASE: marketplace_testing
          DB_USERNAME: marketplace
          DB_PASSWORD: secret
          REDIS_HOST: 127.0.0.1
          MAIL_MAILER: log
        run: |
          set -e
