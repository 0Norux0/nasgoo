      - name: Phase 7 v7.5 — registration mail-transport resilience (static check)
        run: |
          # ROOT CAUSE (v7.4 dev report): registration crashed with HTTP 500
          # when MAIL_HOST=mailpit was configured but the Mailpit container
          # wasn't running. The TransportException from Symfony Mailer
          # bubbled out of event(new Registered($user)) and surfaced to the
          # customer as a 500 — even though the user row was already inserted.
          #
          # v7.5 ships THREE complementary defenses:
          #  1. .env.example defaults to MAIL_MAILER=log (no external service required)
          #  2. User::sendEmailVerificationNotification() override wraps parent in try/catch
          #  3. RegisterController::store() wraps event(new Registered($user)) in try/catch
          #
          # This static sub-check asserts all three defenses are in place so
          # they can't be silently removed by a future refactor.
          python3 << 'PY'
          import re, sys
          from pathlib import Path

          issues = []

          # Defense 1: .env.example default
          env = Path('.env.example').read_text()
          if not re.search(r'^MAIL_MAILER=log\b', env, re.MULTILINE):
              issues.append(('.env.example', 'MAIL_MAILER=log not the default'))

          # Defense 2: User model override
          user = Path('app/Models/User.php').read_text()
          checks = [
              ('User override exists', r'public function sendEmailVerificationNotification\(\)'),
              ('Calls parent', r'parent::sendEmailVerificationNotification\(\)'),
              ('Catches Throwable', r'catch\s*\(\s*\\?Throwable'),
              ('Logs warning',   r'Log::warning'),
          ]
          for name, pat in checks:
              if not re.search(pat, user):
                  issues.append(('app/Models/User.php', f'missing: {name}'))

          # Defense 3: RegisterController wrapper
          ctrl = Path('app/Http/Controllers/Auth/RegisterController.php').read_text()
          if not re.search(r'try\s*\{\s*event\(new Registered', ctrl, re.DOTALL):
              issues.append(('RegisterController', 'event(new Registered) is not wrapped in try/catch'))
          if not re.search(r'catch\s*\(\s*\\?Throwable', ctrl):
              issues.append(('RegisterController', 'no Throwable catch around event(new Registered)'))

          if issues:
              print(f"::error::Phase 7 v7.5 mail-resilience check FAILED — {len(issues)} missing defense(s):")
              for f, msg in issues: print(f"::error file={f}::{msg}")
              sys.exit(1)
          print("✓ Phase 7 v7.5 mail-resilience: all 3 defenses in place (env default + User override + RegisterController wrapper).")
          PY

      - name: Phase 7 v7.5 — registration end-to-end with MAIL_MAILER=log (runtime)
        env:
          APP_ENV: local
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_DATABASE: marketplace_testing
          DB_USERNAME: marketplace
          DB_PASSWORD: secret
          REDIS_HOST: 127.0.0.1
          MAIL_MAILER: log
        run: |
          set -e
          # Boot a real server with MAIL_MAILER=log (the v7.5 default) and
          # POST /register. Assert:
          #   - response is < 500 (no TransportException leaked)
          #   - the user row was created
          #   - a customer role was assigned
          # Then ALSO test the broken-transport path: set MAIL_MAILER=smtp
          # + MAIL_HOST to an unreachable host and confirm registration
          # STILL succeeds (defenses 2 + 3 fire).
          php artisan optimize:clear

          php artisan serve --host=127.0.0.1 --port=8095 > /tmp/serve_v75.log 2>&1 &
          PID=$!
