      - name: Phase 8 — schema-vs-code pre-flight (services + bookings tables match model fillables)
        run: |
          # Same validator pattern as Phase 7 v7.1 schema-vs-code pre-flight —
          # parses each Phase 8 migration to extract its column list, then
          # parses each Phase 8 model's $fillable to verify every fillable
          # field actually exists as a column. Catches the v7.0 bug class
          # where a column was renamed in the migration but the model still
          # referenced the old name.
          python3 << 'PY'
          import re, sys
          from pathlib import Path

          # Map: model file → migration file → expected fillable subset
          targets = {
              'app/Models/ServiceDetail.php':
                  'database/migrations/2026_01_08_000001_create_service_details_table.php',
              'app/Models/ServiceProvider.php':
                  'database/migrations/2026_01_08_000002_create_service_providers_table.php',
              'app/Models/ServiceAvailability.php':
                  'database/migrations/2026_01_08_000004_create_service_availabilities_table.php',
              'app/Models/ServiceBlockedDate.php':
                  'database/migrations/2026_01_08_000005_create_service_blocked_dates_table.php',
              'app/Models/ServiceBooking.php':
                  'database/migrations/2026_01_08_000006_create_service_bookings_table.php',
          }

          issues = []

          for model_path, mig_path in targets.items():
              if not Path(model_path).exists() or not Path(mig_path).exists():
                  issues.append((model_path, f'file missing — model or migration not found'))
                  continue
              model = Path(model_path).read_text()
              mig = Path(mig_path).read_text()

              # Extract $fillable array values
              m = re.search(r"protected \$fillable\s*=\s*\[(.*?)\];", model, re.DOTALL)
              if not m:
                  continue
              fillables = re.findall(r"'([a-z_][a-z0-9_]*)'", m.group(1))

              # Extract columns from migration ($table->string('foo'), ->foreignId('foo'), etc)
              cols = set(re.findall(r"->(?:string|text|integer|unsignedInteger|unsignedSmallInteger|"
                                    r"unsignedTinyInteger|tinyInteger|smallInteger|bigInteger|"
                                    r"boolean|date|time|dateTime|datetime|timestamp|json|jsonb|foreignId|decimal)"
                                    r"\(\s*'([a-z_][a-z0-9_]*)'", mig))

              for f in fillables:
                  if f not in cols and f != 'id':
                      issues.append((model_path, f"fillable '{f}' has no matching column in {mig_path}"))

          if issues:
              print(f"::error::Phase 8 schema-vs-code pre-flight FAILED — {len(issues)} mismatch(es):")
              for f, msg in issues: print(f"::error file={f}::{msg}")
              sys.exit(1)
          print(f"✓ Phase 8 schema-vs-code pre-flight: {len(targets)} models all match their migrations.")
          PY

      - name: Phase 8 — unique-index pre-flight (idempotent seeder + updateOrCreate keys)
        run: |
          # Same pattern as Phase 7 v7.2 — assert that every updateOrCreate
          # / firstOrCreate call in the Phase 8 seeder uses keys that match
          # a real unique index. Prevents the v7.1 duplicate-SKU bug class.
          python3 << 'PY'
          import re, sys
          from pathlib import Path

          # Hard-coded list of (table → set of unique-index column groups)
          # built from the migrations.
          unique_indexes = {
              'products':                       [('vendor_id', 'sku'), ('slug',)],
              'service_details':                [('product_id',)],
              'service_providers':              [('vendor_id', 'slug')],
              'service_provider_assignments':   [('service_provider_id', 'product_id')],
              'service_availabilities':         [('service_provider_id', 'day_of_week')],
              'service_blocked_dates':          [('service_provider_id', 'date')],
              'service_bookings':               [('number',)],
          }

          seeder = Path('database/seeders/DemoSeeder.php').read_text()
          # Find Phase 8 seedServicesAndBookings method only
          phase8 = re.search(r"private function seedServicesAndBookings.*?\n    \}", seeder, re.DOTALL)
          if not phase8:
              print("::error::Phase 8 seeder method seedServicesAndBookings() not found in DemoSeeder.php")
              sys.exit(1)
          body = phase8.group(0)

          # All updateOrCreate / firstOrCreate calls in this method
          calls = re.findall(
              r"(?:Product|ServiceDetail|ServiceProvider|ServiceAvailability|ServiceBlockedDate)::"
              r"updateOrCreate\s*\(\s*\[([^\]]+)\]",
              body
          )

          issues = []
          model_to_table = {
              'Product': 'products', 'ServiceDetail': 'service_details',
              'ServiceProvider': 'service_providers',
              'ServiceAvailability': 'service_availabilities',
              'ServiceBlockedDate': 'service_blocked_dates',
          }
          for call in calls:
              keys = tuple(sorted(re.findall(r"'([a-z_][a-z0-9_]*)'\s*=>", call)))
              found_match = False
              for table, indexes in unique_indexes.items():
                  for idx in indexes:
                      if tuple(sorted(idx)) == keys:
                          found_match = True
                          break
                  if found_match: break
              if not found_match:
                  issues.append(f"updateOrCreate keys {keys} don't match any unique index — would cause duplicate rows on re-seed")

          if issues:
              for issue in issues: print(f"::error::Phase 8 idempotency: {issue}")
              sys.exit(1)
          print(f"✓ Phase 8 unique-index pre-flight: {len(calls)} updateOrCreate calls all use real unique-index keys.")
          PY

