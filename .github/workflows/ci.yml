      - name: Phase 10 v10.15 — share() closures defensively wrapped (auth-critical path)
        run: |
          # ROOT CAUSE class pre-v10.15: any exception inside a shared-prop
          # closure during the post-login Inertia render (e.g. cache driver
          # unreachable, vendor relation throwing, translation cache failing)
          # surfaces as a 500 on the redirect destination. From the customer's
          # browser this looks like "login is broken". v10.15 wraps every
          # share() closure in try/catch with a graceful fallback so login is
          # NEVER blocked by a downstream shared-prop computation failure.
          MID=app/Http/Middleware/HandleInertiaRequests.php
          # Each closure must have its defensive marker
          for MARKER in "auth.user share closure failed" \
                        "cart_summary share closure failed" \
                        "top_categories share closure failed" \
                        "translations cache failed" \
                        "app.version cache failed"; do
              grep -q "$MARKER" $MID || {
                  echo "::error::Phase 10 v10.15: defensive catch marker missing: $MARKER"
                  exit 1
              }
          done
          # v10.14 scope-aware path checks must remain (we preserved the
          # optimization, just wrapped it)
          N_ADMIN=$(grep -c "str_starts_with(\$path, 'admin/')" $MID)
          if [ "$N_ADMIN" != "2" ]; then
              echo "::error::Phase 10 v10.15: v10.14 admin/ scope check changed (expected 2, got $N_ADMIN)"
              exit 1
          fi
          echo "✓ Phase 10 v10.15 — share() closures defensively wrapped, v10.14 optimizations preserved"

