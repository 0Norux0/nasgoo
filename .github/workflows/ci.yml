          # The system-status section in Welcome.tsx has bg-slate-100; its
          # text must be slate-700 or darker.
          WELCOME=resources/js/Pages/Welcome.tsx
          # Extract the homepage-system-status section block and check colors
          BLOCK=$(awk '/data-testid="homepage-system-status"/,/<\/section>/' $WELCOME)
