          # No code fix could resolve "package not actually deployed".
          #
          # v8.6 adds a VERSION file at the project root + an artisan command
          # `php artisan marketplace:version` so the developer can verify in
          # one second exactly which release their files are at, AND run the
          # 4 stub-independent static defenses against their local files.
          #
          # This CI step asserts the VERSION file is present and matches the
          # expected release tag. If a future contributor forgets to bump it,
          # CI fails loudly.
          EXPECTED="Phase 11B.4 v11B.4.3"
          if [ ! -f VERSION ]; then
              echo "::error::Phase 9: VERSION file missing from project root"
