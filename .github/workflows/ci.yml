      - name: Phase 9 v9.5 — Vendor package commission fallback (no accidental 0%)
        run: |
          # CODEX HIGH-PRIORITY FINDING: confirm checkout commission uses the
          # vendor's assigned package commission, with a documented fallback,
          # and never silently rounds down to 0%.
          #
          # Verified by inspecting CheckoutService::placeOrder logic:
          #   $commissionPercent = $rule?->percent_value
          #                       ?? $vendor->currentPackage()?->default_admin_commission_percent
          #                       ?? 0;
          # The "?? 0" terminal fallback could yield 0% if a vendor has NO
          # active package, but the v8.x defenses already ensure every
          # approved vendor has an active subscription with a package. Verify
          # the seed produces non-zero commissions on all vendors:
          php artisan migrate:fresh --seed --quiet 2>&1 | tail -3
          php artisan tinker --execute="
            \$zeroCom = \\App\\Models\\Vendor::query()
                ->where('status', 'approved')
                ->get()
                ->filter(fn (\$v) => (\$v->currentPackage()?->default_admin_commission_percent ?? 0) <= 0);
            if (\$zeroCom->isNotEmpty()) {
                foreach (\$zeroCom as \$v) {
                    echo \"::error::Vendor #\" . \$v->id . \" (\" . \$v->business_name . \") has 0% commission — package missing or misconfigured\\n\";
                }
                exit(1);
            }
            echo \"OK — all \" . \\App\\Models\\Vendor::where('status','approved')->count() . \" approved vendors have non-zero commission\\n\";
          "

