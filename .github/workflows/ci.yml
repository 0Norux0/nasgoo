      - name: Phase 10 — Financial reconciliation invariant (re-asserted on top of v9.3)
        run: |
          php artisan migrate:fresh --seed --quiet 2>&1 | tail -3
          php artisan tinker --execute="
            // Run the full v9.3 invariant against ALL non-cancelled orders.
            // sum(commission + earning) == subtotal - coupon_discount  per-order.
            // sum(allocation) == coupon_discount                       per-order.
            \$bad = \\App\\Models\\Order::query()
                ->whereNotIn('status', ['cancelled'])
                ->with('items')
                ->get()
                ->filter(function (\$o) {
                    \$earningSum = \$o->items->sum('vendor_earning_minor');
                    \$commissionSum = \$o->items->sum('commission_amount_minor');
                    \$allocationSum = \$o->items->sum('coupon_allocation_minor');
                    \$expectedNet = \$o->subtotal_minor - \$o->coupon_discount_minor;
                    return (\$earningSum + \$commissionSum) !== \$expectedNet
                        || \$allocationSum !== \$o->coupon_discount_minor;
                });
            if (\$bad->isNotEmpty()) {
                foreach (\$bad as \$o) {
                    echo \"::error::Order #\" . \$o->id . \" (\" . \$o->number . \") fails reconciliation invariant\\n\";
                }
                exit(1);
            }
            echo \"OK — all \" . \\App\\Models\\Order::whereNotIn('status', ['cancelled'])->count() . \" non-cancelled orders reconcile\\n\";
          "

