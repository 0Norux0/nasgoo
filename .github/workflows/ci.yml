name: Phase 4 Verification

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

# Cancel old runs on the same branch when a new one starts
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ════════════════════════════════════════════════════════════════
  # JOB 1 — PHP / Laravel / Pest
  # Equivalent to: make install (composer part) + make test
  # ════════════════════════════════════════════════════════════════
  laravel:
    name: 🐘 Laravel (install + migrate + seed + test)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: marketplace
          POSTGRES_USER: marketplace
          POSTGRES_PASSWORD: secret
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U marketplace"
          --health-interval 5s --health-timeout 3s --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_pgsql, pgsql, intl, redis, zip, bcmath, gd, pcntl, curl, mbstring
          coverage: none
          tools: composer:v2

      - name: Cache composer packages
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ runner.os }}-${{ hashFiles('composer.json', 'composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install PHP dependencies (composer install)
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: ✅ v3.1 — Verify Filament assets were published by post-autoload-dump
        run: |
          if [ ! -d public/css/filament ] || [ ! -d public/js/filament ]; then
            echo "::error::Filament assets were NOT published to public/ after composer install."
            echo "::error::This means \`filament:upgrade\` was not in composer.json post-autoload-dump."
            echo "::error::The admin UI will render with raw browser styling."
            echo "--- public/css ---"
            ls -la public/css 2>/dev/null || echo "(public/css does not exist)"
            echo "--- public/js ---"
            ls -la public/js  2>/dev/null || echo "(public/js does not exist)"
            exit 1
          fi
          echo "✓ public/css/filament exists ($(find public/css/filament -type f | wc -l) files)"
          echo "✓ public/js/filament  exists ($(find public/js/filament  -type f | wc -l) files)"

      - name: Create marketplace_testing database
        env:
          PGPASSWORD: secret
        run: |
          # Check if DB already exists, only create if missing (idempotent)
          if psql -h 127.0.0.1 -U marketplace -d marketplace -tAc \
              "SELECT 1 FROM pg_database WHERE datname='marketplace_testing'" | grep -q 1; then
            echo "Database marketplace_testing already exists."
          else
            psql -h 127.0.0.1 -U marketplace -d marketplace \
              -c "CREATE DATABASE marketplace_testing;"
            echo "Database marketplace_testing created."
          fi

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
          sed -i 's/DB_HOST=postgres/DB_HOST=127.0.0.1/' .env
          sed -i 's|MEILISEARCH_HOST=http://meilisearch:7700|MEILISEARCH_HOST=http://127.0.0.1:7700|' .env
          sed -i 's/REDIS_HOST=redis/REDIS_HOST=127.0.0.1/' .env

      - name: Verify storage permissions
        run: |
          mkdir -p storage/framework/{cache/data,sessions,views,testing}
          mkdir -p storage/logs bootstrap/cache
          chmod -R 775 storage bootstrap/cache

      - name: Run migrations (smoke test)
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_DATABASE: marketplace
          DB_USERNAME: marketplace
          DB_PASSWORD: secret
        run: php artisan migrate --force

      - name: Run database seeders (Phase 1)
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_DATABASE: marketplace
          DB_USERNAME: marketplace
          DB_PASSWORD: secret
          APP_ENV: local
        run: php artisan db:seed --force

      - name: Verify seeded data
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_DATABASE: marketplace
          DB_USERNAME: marketplace
          DB_PASSWORD: secret
          APP_ENV: local
        run: |
          php artisan tinker --execute="
            \$roles = \Spatie\Permission\Models\Role::pluck('name')->toArray();
            \$expected = ['super_admin', 'admin_staff', 'vendor', 'customer'];
            foreach (\$expected as \$r) {
                if (!in_array(\$r, \$roles, true)) {
                    fwrite(STDERR, \"Missing role: \$r\n\");
                    exit(1);
                }
            }
            \$admin = \App\Models\User::where('email', 'admin@marketplace.test')->first();
            if (!\$admin || !\$admin->hasRole('super_admin')) {
                fwrite(STDERR, \"super_admin user not seeded correctly\n\");
                exit(1);
            }
            \$currencies = \App\Models\Currency::count();
            if (\$currencies < 4) {
                fwrite(STDERR, \"Expected 4+ currencies, got \$currencies\n\");
                exit(1);
            }
            \$templates = \App\Models\NotificationTemplate::distinct('event_key')->count('event_key');
            if (\$templates < 20) {
                fwrite(STDERR, \"Expected 20+ template event types, got \$templates\n\");
                exit(1);
            }
            \$packages = \App\Models\VendorPackage::orderBy('sort_order')->pluck('slug')->toArray();
            \$expectedPackages = ['basic', 'standard', 'professional'];
            if (\$packages !== \$expectedPackages) {
                fwrite(STDERR, \"Expected vendor packages [basic, standard, professional]; got [\" . implode(',', \$packages) . \"]\n\");
                exit(1);
            }
            \$basic = \App\Models\VendorPackage::where('slug', 'basic')->first();
            \$pro = \App\Models\VendorPackage::where('slug', 'professional')->first();
            if ((int) \$basic->default_admin_commission_percent !== 30 || (int) \$pro->default_admin_commission_percent !== 10) {
                fwrite(STDERR, \"Vendor package commission percentages incorrect (expected basic=30, pro=10)\n\");
                exit(1);
            }
            \$topCats = \App\Models\Category::whereNull('parent_id')->count();
            if (\$topCats < 5) {
                fwrite(STDERR, \"Expected 5+ top-level categories, got \$topCats\n\");
                exit(1);
            }
            \$attrs = \App\Models\Attribute::count();
            if (\$attrs < 4) {
                fwrite(STDERR, \"Expected 4+ attributes (Color, Size, Brand, Material), got \$attrs\n\");
                exit(1);
            }
            \$colorValues = \App\Models\Attribute::where('slug', 'color')->first()?->values()->count() ?? 0;
            if (\$colorValues < 5) {
                fwrite(STDERR, \"Expected 5+ color values, got \$colorValues\n\");
                exit(1);
            }
            \$paymentMethods = \App\Models\PaymentMethod::pluck('slug')->toArray();
            \$expectedMethods = ['cod', 'manual_transfer', 'online_mock'];
            foreach (\$expectedMethods as \$m) {
                if (!in_array(\$m, \$paymentMethods, true)) {
                    fwrite(STDERR, \"Expected payment method '\$m' to be seeded; got [\" . implode(',', \$paymentMethods) . \"]\n\");
                    exit(1);
                }
            }
            echo \"All seeded data verified (roles, super_admin, currencies, templates, vendor packages, categories, attributes, payment methods).\n\";
          "

      - name: Run code style check (Pint)
        run: ./vendor/bin/pint --test

      - name: Run tests (make test)
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_DATABASE: marketplace_testing
          DB_USERNAME: marketplace
          DB_PASSWORD: secret
          REDIS_HOST: 127.0.0.1
        run: php artisan test --without-tty

      - name: v5.4 — migrate:fresh --seed produces a complete demo environment
        env:
          # NOTE: must run under APP_ENV=local so DemoSeeder is NOT skipped
          # (it intentionally bails out under testing env).
          APP_ENV: local
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_DATABASE: marketplace_testing
          DB_USERNAME: marketplace
          DB_PASSWORD: secret
          REDIS_HOST: 127.0.0.1
        run: |
          set -e
          php artisan migrate:fresh --seed --force
          php artisan storage:link --force
          # Verify the demo data the developer needs to test checkout + images
          php artisan tinker --execute="
            \$vendor = \App\Models\User::where('email', 'vendor@marketplace.test')->first()?->vendor;
            if (!\$vendor || \$vendor->status !== 'approved') { fwrite(STDERR, 'Demo vendor not approved'); exit(1); }
            \$sub = \$vendor->activeSubscription;
            if (!\$sub) { fwrite(STDERR, 'Demo vendor has no active subscription'); exit(1); }
            \$published = \$vendor->products()->where('status', 'published')->where('stock', '>', 0)->count();
            if (\$published < 3) { fwrite(STDERR, 'Demo vendor needs >=3 cart-ready products, got '.\$published); exit(1); }
            \$rule = \App\Models\VendorCommissionRule::where('vendor_id', \$vendor->id)->where('is_active', true)->first();
            if (!\$rule) { fwrite(STDERR, 'Demo vendor needs a commission rule'); exit(1); }
            \$customer = \App\Models\User::where('email', 'customer@marketplace.test')->first();
            \$addr = \$customer?->addresses()->where('is_default', true)->first();
            if (!\$addr || empty(\$addr->block) || empty(\$addr->street)) { fwrite(STDERR, 'Demo customer needs a default address with block+street'); exit(1); }
            // v5.4: every published demo product must have a primary image whose
            // file actually exists on the public disk (so it renders, not 404s).
            foreach (\$vendor->products()->where('status', 'published')->get() as \$p) {
              \$img = \$p->primaryImage()->first();
              if (!\$img) { fwrite(STDERR, 'Product '.\$p->slug.' has no primary image'); exit(1); }
              if (!\Illuminate\Support\Facades\Storage::disk(config('marketplace.media_disk'))->exists(\$img->path)) {
                fwrite(STDERR, 'Image file missing on disk: '.\$img->path); exit(1);
              }
              if (!\$img->url || !str_contains(\$img->url, '/storage/')) {
                fwrite(STDERR, 'Image URL not web-accessible for '.\$p->slug); exit(1);
              }
            }
            // v5.7: second approved vendor + product must exist for multi-vendor checkout testing
            \$vendor2 = \App\Models\User::where('email', 'vendor2@marketplace.test')->first()?->vendor;
            if (!\$vendor2 || \$vendor2->status !== 'approved') {
                fwrite(STDERR, 'Second demo vendor (vendor2@marketplace.test → Coastal Goods) missing or not approved'); exit(1);
            }
            \$v2Products = \$vendor2->products()->where('status', 'published')->count();
            if (\$v2Products < 1) {
                fwrite(STDERR, 'Second demo vendor needs >=1 published product, got '.\$v2Products); exit(1);
            }
            echo 'Demo data verified: vendor approved + subscribed + commission rule, '.\$published.' cart-ready products WITH images on disk, second vendor (Coastal Goods) with '.\$v2Products.' product, customer has default Gulf-style address.';
          "
          # storage:link symlink must exist so /storage/... serves the files
          test -L public/storage && echo 'storage:link OK' || (echo 'storage:link missing'; exit 1)

      - name: v5.5 — order confirmation route opens without undefined-method error
        env:
          APP_ENV: local
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_DATABASE: marketplace_testing
          DB_USERNAME: marketplace
          DB_PASSWORD: secret
          REDIS_HOST: 127.0.0.1
        run: |
          set -e
          # Boot a real HTTP request against /orders/{id}/confirm as the
          # demo customer — catches "Call to undefined method authorize()"
          # even if Pest somehow skips these tests.
          php artisan tinker --execute="
            \$customer = \App\Models\User::where('email', 'customer@marketplace.test')->firstOrFail();
            \$product  = \App\Models\Product::where('status', 'published')->where('stock', '>', 0)->firstOrFail();
            \$addr     = \$customer->addresses()->where('is_default', true)->firstOrFail();
            // Place a COD order through the CheckoutService directly
            \$checkout = app(\App\Domain\Order\CheckoutService::class);
            app(\App\Domain\Cart\CartService::class)->addItem(\$customer, \$product, 1);
            \$order = \$checkout->place(\$customer, [
                'shipping_address_id' => \$addr->id,
                'payment_method_slug' => 'cod',
            ]);
            // Hit /orders/{id}/confirm via the kernel — exercises the full controller
            \$request = \Illuminate\Http\Request::create('/orders/'.\$order->id.'/confirm', 'GET');
            \$request->setUserResolver(fn () => \$customer);
            \$response = app(\Illuminate\Contracts\Http\Kernel::class)->handle(\$request);
            if (\$response->getStatusCode() !== 200) {
                fwrite(STDERR, 'Expected 200 from /orders/{id}/confirm, got '.\$response->getStatusCode().' — body: '.substr(\$response->getContent(), 0, 500));
                exit(1);
            }
            echo 'Order confirmation route OK (status 200, no undefined-method error).';
          "

      - name: v5.7 — multi-product checkout places an order without lazy-load crash
        env:
          APP_ENV: local
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_DATABASE: marketplace_testing
          DB_USERNAME: marketplace
          DB_PASSWORD: secret
          REDIS_HOST: 127.0.0.1
        run: |
          set -e
          # Place a 2-product order through the real CheckoutService with
          # Model::shouldBeStrict(true) — catches "Attempted to lazy load
          # [vendor] on model [Product]" the developer reported, even if
          # Pest skips for some reason.
          php artisan tinker --execute="
            \Illuminate\Database\Eloquent\Model::shouldBeStrict(true);
            \$customer  = \App\Models\User::where('email', 'customer@marketplace.test')->firstOrFail();
            \$addr      = \$customer->addresses()->where('is_default', true)->firstOrFail();
            \$products  = \App\Models\Product::where('status', 'published')->where('stock', '>=', 1)->limit(2)->get();
            if (\$products->count() < 2) { fwrite(STDERR, 'Need 2 published demo products; got '.\$products->count()); exit(1); }
            // Empty any existing cart first
            \$cart = app(\App\Domain\Cart\CartService::class)->getOrCreate(\$customer);
            \$cart->items()->delete();
            foreach (\$products as \$p) {
                app(\App\Domain\Cart\CartService::class)->addItem(\$customer, \$p, 1);
            }
            try {
                \$order = app(\App\Domain\Order\CheckoutService::class)->place(\$customer, [
                    'shipping_address_id' => \$addr->id,
                    'payment_method_slug' => 'cod',
                ]);
            } catch (\\Throwable \$e) {
                fwrite(STDERR, 'Multi-product checkout failed: '.\$e->getMessage()); exit(1);
            }
            if (\$order->items()->count() !== 2) {
                fwrite(STDERR, 'Expected 2 order items, got '.\$order->items()->count()); exit(1);
            }
            echo 'Multi-product checkout OK — placed order #'.\$order->number.' with '.\$order->items()->count().' items.';
          "

      - name: v5.8 — multi-product checkout via HTTP (reproduces dev's exact path)
        env:
          APP_ENV: local
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_DATABASE: marketplace_testing
          DB_USERNAME: marketplace
          DB_PASSWORD: secret
          REDIS_HOST: 127.0.0.1
        run: |
          set -e
          # The v5.7 CI step above exercises CheckoutService directly.
          # The dev reported v5.7 didn't fix their HTTP flow, so this step
          # dispatches REAL HTTP requests through the kernel (POST /cart/items
          # twice → POST /checkout) under Model::shouldBeStrict(true).
          # Belt-and-suspenders coverage of the actual dev path.
          php artisan tinker --execute="
            \Illuminate\Database\Eloquent\Model::shouldBeStrict(true);
            \$customer = \App\Models\User::where('email', 'customer@marketplace.test')->firstOrFail();
            \$addr     = \$customer->addresses()->where('is_default', true)->firstOrFail();
            \$products = \App\Models\Product::where('status', 'published')->where('stock', '>=', 1)->limit(2)->get();
            if (\$products->count() < 2) { fwrite(STDERR, 'Need 2 published demo products'); exit(1); }

            // Empty any existing cart
            \$cart = app(\App\Domain\Cart\CartService::class)->getOrCreate(\$customer);
            \$cart->items()->delete();

            \$kernel = app(\Illuminate\Contracts\Http\Kernel::class);
            foreach (\$products as \$p) {
                \$req = \Illuminate\Http\Request::create('/cart/items', 'POST', [
                    'product_id' => \$p->id, 'quantity' => 1,
                ]);
                \$req->setUserResolver(fn () => \$customer);
                \$resp = \$kernel->handle(\$req);
                if (\$resp->getStatusCode() >= 500) {
                    fwrite(STDERR, 'Cart add failed for product '.\$p->id.': '.\$resp->getStatusCode().' — '.substr(\$resp->getContent(), 0, 400));
                    exit(1);
                }
            }

            // POST /checkout — the dev's exact failure point
            \$req = \Illuminate\Http\Request::create('/checkout', 'POST', [
                'shipping_address_id' => \$addr->id,
                'payment_method_slug' => 'cod',
            ]);
            \$req->setUserResolver(fn () => \$customer);
            \$resp = \$kernel->handle(\$req);
            \$status = \$resp->getStatusCode();
            if (\$status >= 500) {
                fwrite(STDERR, 'Checkout HTTP returned '.\$status.' — body: '.substr(\$resp->getContent(), 0, 800));
                exit(1);
            }
            // Expect 302 redirect (Inertia follows it)
            if (\$status !== 302) {
                fwrite(STDERR, 'Expected 302 redirect from POST /checkout, got '.\$status); exit(1);
            }

            \$order = \$customer->fresh()->orders()->latest()->first();
            if (!\$order || \$order->items()->count() !== 2) {
                fwrite(STDERR, 'Order not created with 2 items'); exit(1);
            }
            echo 'HTTP multi-product checkout OK — order #'.\$order->number.' with 2 items, no lazy-load crash.';
          "

      - name: Phase 5 — demo data ready (delivered order, review, wishlist, payout, shipping zones)
        env:
          APP_ENV: local
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_DATABASE: marketplace_testing
          DB_USERNAME: marketplace
          DB_PASSWORD: secret
          REDIS_HOST: 127.0.0.1
        run: |
          set -e
          # Phase 5 seed produces a delivered order + approved review + wishlist
          # entries + a pending payout request + 2 shipping zones with 4 methods.
          # Verify each is queryable so the developer can test the modules
          # immediately after migrate:fresh --seed.
          php artisan tinker --execute="
            \$customer = \App\Models\User::where('email', 'customer@marketplace.test')->firstOrFail();

            // 1. Delivered order for review testing
            \$delivered = \$customer->orders()->where('status', 'delivered')->first();
            if (!\$delivered) { fwrite(STDERR, 'Phase 5: no delivered demo order'); exit(1); }
            if (\$delivered->items()->count() < 1) { fwrite(STDERR, 'Phase 5: delivered order has no items'); exit(1); }

            // 2. Approved review on a product
            \$reviewed = \App\Models\ProductReview::where('status', 'approved')->where('is_verified_purchase', true)->first();
            if (!\$reviewed) { fwrite(STDERR, 'Phase 5: no approved verified-purchase review'); exit(1); }
            \$product = \$reviewed->product;
            if ((int) \$product->rating_count < 1) { fwrite(STDERR, 'Phase 5: rating_count not rolled up after review approval'); exit(1); }

            // 3. Wishlist entries for the customer
            \$wishCount = \$customer->wishlist()->count();
            if (\$wishCount < 1) { fwrite(STDERR, 'Phase 5: customer wishlist empty'); exit(1); }

            // 4. Pending payout request awaiting admin
            \$payout = \App\Models\VendorPayoutRequest::where('status', 'pending')->first();
            if (!\$payout) { fwrite(STDERR, 'Phase 5: no pending payout request'); exit(1); }

            // 5. Shipping zones + methods
            \$zoneCount   = \App\Models\ShippingZone::where('is_active', true)->count();
            \$methodCount = \App\Models\ShippingMethod::where('is_active', true)->count();
            if (\$zoneCount < 2)   { fwrite(STDERR, 'Phase 5: <2 shipping zones seeded'); exit(1); }
            if (\$methodCount < 3) { fwrite(STDERR, 'Phase 5: <3 shipping methods seeded'); exit(1); }

            // 6. ShippingResolver works end-to-end
            \$methods = app(\App\Domain\Shipping\ShippingResolver::class)->availableFor('KW', null, 10000);
            if (\$methods->count() < 1) { fwrite(STDERR, 'Phase 5: shipping resolver returns no methods for KW'); exit(1); }

            // 7. Vendor wallet — v6.2 requires POSITIVE available balance so
            // the payout request form on /vendor/wallet renders, not just a
            // disabled state. Also assert ≥3 delivered demo orders (v6.2
            // seeds three so the released balance comfortably exceeds the
            // seeded payout reservation).
            \$vendor = \App\Models\User::where('email', 'vendor@marketplace.test')->firstOrFail()->vendor;
            \$balance = app(\App\Domain\Payout\VendorWalletService::class)->balanceFor(\$vendor);
            if (\$balance['lifetime_earnings_minor'] <= 0) { fwrite(STDERR, 'Phase 5: vendor wallet shows zero lifetime earnings'); exit(1); }
            if (\$balance['released_minor'] <= 0) { fwrite(STDERR, 'Phase 5 v6.2: released_minor must be > 0 after demo seed'); exit(1); }
            if (\$balance['available_balance_minor'] <= 0) {
                fwrite(STDERR, 'Phase 5 v6.2: available_balance_minor must be > 0 after demo seed so payout form is reachable. Got: ' . \$balance['available_balance_minor']);
                exit(1);
            }
            \$deliveredCount = \App\Models\User::where('email', 'customer@marketplace.test')->firstOrFail()
                ->orders()->where('status', 'delivered')->count();
            if (\$deliveredCount < 3) {
                fwrite(STDERR, 'Phase 5 v6.2: expected >=3 delivered demo orders, got '.\$deliveredCount);
                exit(1);
            }

            echo 'Phase 5 demo data verified: delivered order, approved review (verified purchase, rolled up), '
                .\$wishCount.' wishlist item(s), pending payout request, '.\$zoneCount.' zone(s) / '.\$methodCount.' method(s), '
                .'vendor wallet lifetime '.number_format(\$balance['lifetime_earnings_minor']/100, 3).' '.\$balance['currency'].'.';
          "

      - name: v6.1 — online-payment confirmation does not lazy-load events.actor
        env:
          APP_ENV: local
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_DATABASE: marketplace_testing
          DB_USERNAME: marketplace
          DB_PASSWORD: secret
          REDIS_HOST: 127.0.0.1
        run: |
          set -e
          # Reproduces the dev's reported v6.0 bug: online/card payment order
          # → /orders/{id}/confirm threw "Attempted to lazy load [actor] on
          # model [App\Models\OrderEvent]" because OrderController::confirm()
          # eager-loaded events but not events.actor. v6.1 adds .actor to the
          # eager-load chain. This step places a real order through the HTTP
          # kernel under Model::shouldBeStrict(true) and follows the redirect
          # to the confirm page — if v6.1 didn't fix it, this step returns 500.
          php artisan tinker --execute="
            \Illuminate\Database\Eloquent\Model::shouldBeStrict(true);
            \$customer = \App\Models\User::where('email', 'customer@marketplace.test')->firstOrFail();
            \$addr     = \$customer->addresses()->where('is_default', true)->firstOrFail();
            \$product  = \App\Models\Product::where('status', 'published')->where('stock', '>=', 1)->first();

            // Reset cart
            \$cart = app(\App\Domain\Cart\CartService::class)->getOrCreate(\$customer);
            \$cart->items()->delete();

            \$kernel = app(\Illuminate\Contracts\Http\Kernel::class);
            \$req = \Illuminate\Http\Request::create('/cart/items', 'POST', [
                'product_id' => \$product->id, 'quantity' => 1,
            ]);
            \$req->setUserResolver(fn () => \$customer);
            \$kernel->handle(\$req);

            // Use online_mock (multi-event payment flow — initiates, captures,
            // and triggers status transitions, producing several order events).
            \$req = \Illuminate\Http\Request::create('/checkout', 'POST', [
                'shipping_address_id' => \$addr->id,
                'payment_method_slug' => 'online_mock',
            ]);
            \$req->setUserResolver(fn () => \$customer);
            \$resp = \$kernel->handle(\$req);
            if (\$resp->getStatusCode() >= 500) {
                fwrite(STDERR, 'Online checkout failed: '.\$resp->getStatusCode().' '.substr(\$resp->getContent(), 0, 600));
                exit(1);
            }

            \$order = \$customer->fresh()->orders()->latest()->first();
            if (!\$order) { fwrite(STDERR, 'No order created'); exit(1); }

            // Manufacture 3 events so the lazy-load condition (multiple rows)
            // is real on the confirm page.
            \$order->events()->create(['event_type' => 'payment.initiated', 'message' => 'init',     'actor_id' => \$customer->id, 'actor_role' => 'system']);
            \$order->events()->create(['event_type' => 'payment.captured',  'message' => 'captured', 'actor_id' => \$customer->id, 'actor_role' => 'system']);
            \$order->events()->create(['event_type' => 'status.confirmed',  'message' => 'confirmed','actor_id' => \$customer->id, 'actor_role' => 'system']);

            \$req = \Illuminate\Http\Request::create('/orders/'.\$order->id.'/confirm', 'GET');
