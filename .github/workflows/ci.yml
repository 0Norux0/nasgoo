      - name: v6.2 — admin order EditOrder header actions + full payout E2E flow
        env:
          APP_ENV: local
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_DATABASE: marketplace_testing
          DB_USERNAME: marketplace
          DB_PASSWORD: secret
          REDIS_HOST: 127.0.0.1
        run: |
          set -e
          # Static check: confirm EditOrder.php contains all 7 lifecycle
          # actions. The v6.1 build only put them in ViewOrder, which is why
          # the dev (who opened Edit) saw nothing. v6.2 mirrors them.
          php -r "
            \$src = file_get_contents('app/Filament/Resources/OrderResource/Pages/EditOrder.php');
            foreach (['confirm', 'ship', 'deliver', 'cod_capture', 'capture_transfer', 'cancel', 'refund'] as \$action) {
                if (! str_contains(\$src, \"Action::make('\$action')\")) {
                    fwrite(STDERR, 'v6.2: EditOrder missing action: ' . \$action . PHP_EOL);
                    exit(1);
                }
            }
            echo 'v6.2: EditOrder header actions OK — all 7 lifecycle actions present.' . PHP_EOL;
          "

          # End-to-end: vendor submits payout → admin approves → admin marks paid.
          # Verifies the full audit trail + balance state machine.
          php artisan tinker --execute="
            \$admin  = \App\Models\User::where('email', 'admin@marketplace.test')->firstOrFail();
            \$vendor = \App\Models\User::where('email', 'vendor@marketplace.test')->firstOrFail()->vendor;

            \$balanceBefore = app(\App\Domain\Payout\VendorWalletService::class)->balanceFor(\$vendor);
            if (\$balanceBefore['available_balance_minor'] <= 0) {
                fwrite(STDERR, 'v6.2: vendor available balance is zero — payout flow cannot be tested. Seed data is wrong.');
                exit(1);
            }

            // Step 1: vendor submits payout request
            \$request = app(\App\Domain\Payout\PayoutService::class)->request(
                \$vendor,
                (int) min(\$balanceBefore['available_balance_minor'], 1000), // 1 KWD or available
                ['iban' => 'KW00CI-TEST', 'bank_name' => 'CI Bank', 'account_holder_name' => 'CI Test'],
                'bank_transfer'
            );
            echo 'v6.2 step 1: payout request created #' . \$request->id . ' status=' . \$request->status . PHP_EOL;

            // Step 2: admin approves
            \$request = app(\App\Domain\Payout\PayoutService::class)->approve(\$request, \$admin, 'CI E2E test approval');
            if (\$request->status !== 'approved') { fwrite(STDERR, 'Approval failed'); exit(1); }
            echo 'v6.2 step 2: approved by admin ✓' . PHP_EOL;

            // Step 3: admin marks paid
            \$request = app(\App\Domain\Payout\PayoutService::class)->markPaid(\$request, \$admin, 'CI-SWIFT-XYZ');
            if (\$request->status !== 'paid') { fwrite(STDERR, 'Mark paid failed'); exit(1); }
            if (\$request->transfer_reference !== 'CI-SWIFT-XYZ') { fwrite(STDERR, 'Transfer ref not stored'); exit(1); }
            echo 'v6.2 step 3: marked paid with ref CI-SWIFT-XYZ ✓' . PHP_EOL;

            // Step 4: verify wallet state reflects payout
            \$balanceAfter = app(\App\Domain\Payout\VendorWalletService::class)->balanceFor(\$vendor);
            if (\$balanceAfter['paid_out_minor'] < \$request->requested_amount_minor) {
                fwrite(STDERR, 'paid_out did not increase after markPaid');
                exit(1);
            }
            echo 'v6.2 step 4: wallet paid_out=' . number_format(\$balanceAfter['paid_out_minor']/100, 3) . ' KWD ✓' . PHP_EOL;

            // Step 5: audit log captured each transition
            \$audits = \App\Models\AuditLog::where('model_type', \App\Models\VendorPayoutRequest::class)
                ->where('model_id', \$request->id)
                ->pluck('action')
                ->toArray();
            foreach (['vendor_payout.requested', 'vendor_payout.approved', 'vendor_payout.paid'] as \$expected) {
                if (! in_array(\$expected, \$audits, true)) {
                    fwrite(STDERR, 'v6.2 audit log missing: ' . \$expected . ' (got: ' . implode(',', \$audits) . ')');
                    exit(1);
                }
            }
            echo 'v6.2 step 5: audit log complete (requested → approved → paid) ✓' . PHP_EOL;

            echo PHP_EOL . 'v6.2 OK — admin EditOrder actions present; full payout E2E flow green.';
          "

      - name: v6.3 — migrate:fresh --seed succeeds + permissions registered + actionable demo orders exist
