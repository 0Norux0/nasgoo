          fi
          # Guard against any 'fulfillment_type' string sneaking back in (the v7.0 bug)
          if echo "$OUT" | grep -qi "fulfillment_type"; then
              echo "v7.1 FAIL — 'fulfillment_type' appeared in seed output — the v7.0 bug regressed." >&2
              echo "$OUT" | grep -i fulfillment_type >&2
              exit 1
          fi
          # And verify the products table really has the CORRECT column name
          php artisan tinker --execute="
            if (! \Illuminate\Support\Facades\Schema::hasColumn('products', 'fulfillment_mode')) {
                fwrite(STDERR, 'v7.1 FAIL — products.fulfillment_mode missing (Phase 6 migration regressed)'.PHP_EOL); exit(1);
            }
            if (\Illuminate\Support\Facades\Schema::hasColumn('products', 'fulfillment_type')) {
                fwrite(STDERR, 'v7.1 FAIL — products.fulfillment_type exists (someone added the wrong column!)'.PHP_EOL); exit(1);
            }
            echo 'v7.1: products.fulfillment_mode present, products.fulfillment_type absent ✓'.PHP_EOL;
          "
          echo "v7.1 OK — migrate:fresh --seed --force completed cleanly + fulfillment_mode is the only fulfillment column ✓"

      - name: Phase 7 v7.2 — unique-index lookup pre-flight (prevents v7.1 duplicate-SKU bug class)
        run: |
          # ROOT CAUSE (v7.1 dev report): the Phase 7 demo seeder used
          # firstOrCreate(['slug' => 'demo-custom-tshirt'], [..., 'sku' => 'DEMO-TSHIRT-001', ...])
          # but the demo SKU collided with an existing Phase 3 demo product
          # for the same vendor. SQL rejected the INSERT with:
          #   "Duplicate entry '1-DEMO-TSHIRT-001' for key 'products_vendor_id_sku_unique'"
          #
          # Two compounding causes:
          #  1. Lookup key (slug) did not match the unique index (vendor_id, sku),
          #     so firstOrCreate didn't find the existing row to update.
          #  2. The SKU was hardcoded to a value already used by another demo
          #     seeder method.
          #
          # v7.2 ships:
          #  - Renamed SKUs (DEMO-CUSTOM-MUG-001 / DEMO-CUSTOM-TSHIRT-001) so
          #    they are unique within the vendor.
          #  - Lookup switched to updateOrCreate(['vendor_id'=>..., 'sku'=>...])
          #    which matches the actual unique index and is truly idempotent.
          #
          # This pre-flight statically asserts BOTH:
          #  - Every Phase 7 firstOrCreate/updateOrCreate looks up by columns
          #    that form an existing UNIQUE index on the target table.
          #  - Bracket-balanced top-level key extraction so nested arrays
          #    don't false-positive.
          python3 << 'PY'
          import re, sys
          from pathlib import Path

          mig_files = sorted(Path('database/migrations').glob('*.php'))

          def extract_closure(src, oi):
              d = 0
              for i in range(oi, len(src)):
                  if src[i] == '{': d += 1
                  elif src[i] == '}':
                      d -= 1
                      if d == 0: return src[oi+1:i]
              return ''

          def up_body(src):
              s = re.search(r"public function up\(\)\s*:\s*void\s*\{", src)
              return extract_closure(src, s.end()-1) if s else ''

          def unique_indexes_for(table):
              uniques = set()
              for m in mig_files:
                  up = up_body(m.read_text())
                  if not up: continue
                  for kw in ['create', 'table']:
                      for sig in re.finditer(rf"Schema::{kw}\(\s*'{table}'\s*,\s*function\s*\(\s*Blueprint\s+\$table\s*\)\s*\{{", up):
                          body = extract_closure(up, sig.end()-1)
                          for um in re.finditer(r"->unique\(\s*\[\s*([^\]]+)\s*\]", body):
                              cols = tuple(re.findall(r"'([a-z_]+)'", um.group(1)))
                              if cols: uniques.add(cols)
                          for um in re.finditer(r"\$table->\w+\(\s*'([a-z_]+)'\s*\)(?:->[^;]*)*->unique\(", body):
                              uniques.add((um.group(1),))
              return uniques

          def extract_balanced(src, st):
              d = 0
              for i in range(st, len(src)):
                  if src[i] == '[': d += 1
                  elif src[i] == ']':
                      d -= 1
                      if d == 0: return src[st+1:i], i
              return '', -1

          def top_level_keys(b):
              o, d, i = [], 0, 0
              while i < len(b):
                  c = b[i]
                  if c == '[': d += 1
                  elif c == ']': d -= 1
                  elif d == 0 and c == "'":
                      j = b.find("'", i+1)
                      if j > 0:
                          k = b[i+1:j]
                          if b[j+1:].lstrip().startswith('=>'): o.append(k)
                          i = j + 1; continue
                  i += 1
              return o

          models_tables = {
              'Product':'products','CartItem':'cart_items','CartItemCustomization':'cart_item_customizations',
              'OrderItem':'order_items','OrderItemCustomization':'order_item_customizations',
              'CustomizationProof':'customization_proofs','ProductCustomizationField':'product_customization_fields',
              'Order':'orders','OrderAddress':'order_addresses',
          }
          table_uniques = {t: unique_indexes_for(t) for t in models_tables.values()}

          phase7 = [
              'database/seeders/DemoSeeder.php',
              'app/Domain/Customization/CustomizationCartService.php',
              'app/Domain/Customization/ProofWorkflowService.php',
              'app/Http/Controllers/CustomizationCartController.php',
              'app/Http/Controllers/CustomerProofResponseController.php',
              'app/Http/Controllers/Vendor/VendorCustomizationFieldController.php',
              'app/Http/Controllers/Vendor/VendorCustomizationProofController.php',
          ]
          issues = []
          for f in phase7:
              src = Path(f).read_text()
              if f.endswith('DemoSeeder.php'):
                  sub = re.search(r'private function seedCustomizableProductsAndOrder\(\): void\s*\{', src)
                  if sub: src = extract_closure(src, sub.end()-1)
              for model, table in models_tables.items():
                  for m in re.finditer(rf'(?:\\?App\\Models\\)?{model}::(?:firstOrCreate|updateOrCreate)\s*\(', src):
                      after = src[m.end():]; bi = after.find('[')
                      if bi < 0: continue
                      lookup_inner, close = extract_balanced(src, m.end()+bi)
                      if close < 0: continue
                      lookup_keys = tuple(sorted(top_level_keys(lookup_inner)))
                      uniques = table_uniques.get(table, set())
                      if not any(frozenset(lookup_keys) == frozenset(u) for u in uniques):
                          issues.append((f, model, table, lookup_keys, sorted(uniques)))

          if issues:
              print(f"::error::Phase 7 v7.2 unique-index pre-flight FAILED — {len(issues)} write-path(s) keyed on a non-unique combination:")
              for f, model, table, lk, u in issues:
                  print(f"::error file={f}::{model}::firstOrCreate/updateOrCreate keyed on ({','.join(lk)}); table {table} unique indexes: {u}")
              sys.exit(1)
          print("✓ Phase 7 v7.2 unique-index pre-flight CLEAN — every firstOrCreate/updateOrCreate keys on a real unique index.")
          PY

      - name: Phase 7 v7.2 — migrate:fresh --seed runs cleanly TWICE in a row (idempotency proof)
