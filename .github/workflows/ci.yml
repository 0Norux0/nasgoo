            "tests/Feature/MultiProductCheckoutTest.php|v5.7: Multi-product checkout — single/multi-same-vendor/multi-different-vendor place order under strict mode without product->vendor lazy-load crash; cart + checkout pages render with N items; cancel restocks all lines; vendor sees only own items"
            "tests/Feature/MultiProductCheckoutDemoTest.php|v5.8: HARD multi-product checkout via demo data — customer@marketplace.test buys 2 demo products from vendor@marketplace.test or vendor+vendor2 mix; reproduces the dev's exact reported flow under strict mode"
            "tests/Feature/ProductReviewTest.php|Phase 5: reviews — verified-purchase enforcement (delivered-only), pending workflow, admin approve/reject, rating rollup, vendor sees own products' reviews"
            "tests/Feature/WishlistTest.php|Phase 5: wishlist — add/remove, dedup via unique index, guest→login redirect, scoped to owner, is_wishlisted prop on product detail"
            "tests/Feature/VendorPayoutTest.php|Phase 5: vendor wallet + payouts — in-escrow/releasing/released breakdown, request validates against available balance, admin approve/reject/markPaid, no double-spend, vendor sees own only"
