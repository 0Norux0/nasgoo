            \$so = \$supplierOrders->first();
            if (\$so->status !== 'pending') {
                fwrite(STDERR, 'Phase 6 FAIL — supplier order should start in pending, got '.\$so->status.PHP_EOL);
                exit(1);
            }
            if (\$so->supplier_cost_minor <= 0) {
                fwrite(STDERR, 'Phase 6 FAIL — supplier_cost not snapshotted on supplier_order.'.PHP_EOL);
                exit(1);
            }
            echo 'Phase 6 step 2: supplier order '.\$so->number.' status='.\$so->status.' cost='.\$so->supplier_cost_minor.' ✓'.PHP_EOL;
          "

