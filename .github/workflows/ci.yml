      - name: Phase 11A v11A.3 — line-through original price meets WCAG AA contrast
        run: |
          # text-slate-400 on white = ~3.5:1 (FAILS WCAG AA which requires 4.5:1
          # for normal text). v11A.3 replaces all such uses with text-slate-500
          # (~4.6:1, AA pass) on the active product cards.
          for F in resources/js/Components/ui/v11/ProductCard.tsx \
                   resources/js/Pages/Catalog/Index.tsx; do
              # The unsafe combination "text-slate-400 line-through" must be ABSENT
              if grep -qE 'text-slate-400\s+line-through|text-slate-400[^"]*line-through' $F; then
                  echo "::error::Phase 11A v11A.3: $F still uses text-slate-400 line-through (~3.5:1, FAILS AA)"
                  exit 1
              fi
              # The accessible alternative must be present (with line-through)
              grep -qE 'text-slate-500[^"]*line-through' $F || {
                  echo "::error::Phase 11A v11A.3: $F missing AA-compliant text-slate-500 line-through"
                  exit 1
              }
          done
          echo "✓ Phase 11A v11A.3 — strike-through original prices meet WCAG AA"

