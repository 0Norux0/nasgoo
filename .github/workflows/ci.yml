          echo "== Step 2: demo customer dropship order auto-created a supplier_order ==" >&2
          php artisan tinker --execute="
            \$customer = \App\Models\User::where('email', 'customer@marketplace.test')->firstOrFail();
            \$dropOrder = \$customer->orders()->where('number', 'like', 'DEMO-DROPSHIP-%')->first();
