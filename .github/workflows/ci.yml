            \$order = \App\Models\Order::where('number', 'like', 'DEMO-CUSTOM-%')->first();
            if (! \$order) { fwrite(STDERR, 'v7.3 FAIL — sample customizable order missing'.PHP_EOL); exit(1); }
            \$item = \$order->items()->first();
            if (! \$item || (int) \$item->customization_fee_minor === 0) {
