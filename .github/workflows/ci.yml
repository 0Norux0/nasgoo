              exit 1
          fi
          if ! echo "$OUT" | grep -q "Phase 8 v8.2"; then
              echo "::error::Phase 8 v8.2 filter matched no scenarios"
              exit 1
          fi
          echo "✓ Phase 8 v8.2: index-name regression scenarios all green."

      - name: Phase 7 — Customizable products end-to-end (schema + demo + proof workflow + private disk)
        env:
          APP_ENV: local
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_DATABASE: marketplace_testing
          DB_USERNAME: marketplace
          DB_PASSWORD: secret
          REDIS_HOST: 127.0.0.1
        run: |
          set -e

          # ── Phase 7 sub-check 1 — schema + permissions + customizable demo products ──
          echo "== Phase 7 sub-check 1: schema present + customizable products + 5 perms registered ==" >&2
          php artisan tinker --execute="
            // Tables exist
            foreach (['product_customization_fields','cart_item_customizations','order_item_customizations','customization_proofs'] as \$t) {
                if (! \Illuminate\Support\Facades\Schema::hasTable(\$t)) {
                    fwrite(STDERR, 'Phase 7 FAIL — missing table: '.\$t.PHP_EOL); exit(1);
                }
            }
            // order_items + cart_items got their new columns
            foreach (['customization_fee_minor','customization_status'] as \$c) {
                if (! \Illuminate\Support\Facades\Schema::hasColumn('order_items', \$c)) {
                    fwrite(STDERR, 'Phase 7 FAIL — order_items missing '.\$c.PHP_EOL); exit(1);
                }
            }
            if (! \Illuminate\Support\Facades\Schema::hasColumn('cart_items','customization_fee_minor')) {
                fwrite(STDERR, 'Phase 7 FAIL — cart_items missing customization_fee_minor'.PHP_EOL); exit(1);
            }

            \$custProducts = \App\Models\Product::where('type','custom')->where('status','published')->count();
            if (\$custProducts < 2) { fwrite(STDERR, 'Phase 7 FAIL — expected >=2 customizable demo products, got '.\$custProducts.PHP_EOL); exit(1); }

            \$fields = \App\Models\ProductCustomizationField::count();
            if (\$fields < 6) { fwrite(STDERR, 'Phase 7 FAIL — expected >=6 customization fields total, got '.\$fields.PHP_EOL); exit(1); }

            // 5 permissions registered
            \$missing = [];
            foreach (['customization_fields.view','customization_fields.manage','customization_proofs.view','customization_proofs.upload','customization_proofs.respond'] as \$p) {
                if (! \Spatie\Permission\Models\Permission::where('name', \$p)->exists()) { \$missing[] = \$p; }
            }
            if (\$missing) { fwrite(STDERR, 'Phase 7 FAIL — missing perms: '.implode(',', \$missing).PHP_EOL); exit(1); }

            echo 'sub-check 1: customizable_products='.\$custProducts.', fields='.\$fields.', perms ✓'.PHP_EOL;
          "

          # ── Phase 7 sub-check 2 — sample customization order + sent proof + snapshot rows ──
          echo "== Phase 7 sub-check 2: sample customization order with snapshot rows + sent proof ==" >&2
          php artisan tinker --execute="
            \$order = \App\Models\Order::where('number','like','DEMO-CUSTOM-%')->first();
            if (! \$order) { fwrite(STDERR, 'Phase 7 FAIL — no DEMO-CUSTOM-% order seeded'.PHP_EOL); exit(1); }

            \$item = \$order->items()->first();
            if (! \$item) { fwrite(STDERR, 'Phase 7 FAIL — order has no items'.PHP_EOL); exit(1); }
            if ((int)\$item->customization_fee_minor <= 0) { fwrite(STDERR, 'Phase 7 FAIL — customization_fee_minor should be > 0, got '.\$item->customization_fee_minor.PHP_EOL); exit(1); }
            if (\$item->customization_status === null) { fwrite(STDERR, 'Phase 7 FAIL — customization_status is null'.PHP_EOL); exit(1); }

            \$snaps = \$item->customizations()->count();
            if (\$snaps < 4) { fwrite(STDERR, 'Phase 7 FAIL — expected >=4 order_item_customizations rows, got '.\$snaps.PHP_EOL); exit(1); }

            \$sent = \App\Models\CustomizationProof::where('order_item_id', \$item->id)
                ->where('status', \App\Models\CustomizationProof::STATUS_SENT)->count();
            if (\$sent < 1) { fwrite(STDERR, 'Phase 7 FAIL — expected at least 1 SENT proof on demo order'.PHP_EOL); exit(1); }

            echo 'sub-check 2: order='.\$order->number.', snapshot_rows='.\$snaps.', sent_proofs='.\$sent.', fee_minor='.\$item->customization_fee_minor.PHP_EOL;
          "

          # ── Phase 7 sub-check 3 — ProofWorkflowService state machine end-to-end ──
          echo "== Phase 7 sub-check 3: ProofWorkflowService send → approve walks the state machine ==" >&2
          php artisan tinker --execute="
            \$svc = app(\App\Domain\Customization\ProofWorkflowService::class);
            \$vendor = \App\Models\Vendor::first();
            \$order = \App\Models\Order::factory()->create();
            \$item = \App\Models\OrderItem::factory()->create([
                'order_id' => \$order->id, 'vendor_id' => \$vendor->id,
                'customization_status' => \App\Models\OrderItem::CUST_PENDING,
            ]);
            \$proof = \App\Models\CustomizationProof::create([
                'order_item_id' => \$item->id, 'vendor_id' => \$vendor->id,
                'file_path' => 'test/path.jpg', 'file_original_name' => 'p.jpg',
                'file_mime' => 'image/jpeg', 'file_size_bytes' => 100,
                'status' => \App\Models\CustomizationProof::STATUS_DRAFT,
            ]);
            \$svc->send(\$proof);
            if (\$item->fresh()->customization_status !== \App\Models\OrderItem::CUST_PROOF_UPLOADED) { fwrite(STDERR, 'Phase 7 FAIL — send should advance to proof_uploaded'.PHP_EOL); exit(1); }
            \$svc->approve(\$proof->fresh(), 'looks good');
            if (\$item->fresh()->customization_status !== \App\Models\OrderItem::CUST_CUSTOMER_APPROVED) { fwrite(STDERR, 'Phase 7 FAIL — approve should advance to customer_approved'.PHP_EOL); exit(1); }
            echo 'sub-check 3: pending → proof_uploaded → customer_approved ✓'.PHP_EOL;
          "

          # ── Phase 7 sub-check 4 — private-disk uploads never exposed at /storage/* ──
          echo "== Phase 7 sub-check 4: private-disk customization uploads return 404 on /storage/... ==" >&2
          mkdir -p storage/app/private/customizations/9999
          echo "secret" > storage/app/private/customizations/9999/random_test_blob.bin
          php artisan serve --host=127.0.0.1 --port=8011 > /tmp/serve_p7.log 2>&1 &
          PID=$!
          sleep 3
          # Storage symlink (public disk) should not expose the private dir
          CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8011/storage/customizations/9999/random_test_blob.bin || echo "000")
          kill $PID 2>/dev/null || true
          if [ "$CODE" != "404" ]; then
              echo "Phase 7 FAIL — /storage/customizations/* returned HTTP $CODE (expected 404 — private disk must not be web-accessible)" >&2
              exit 1
          fi
          rm -rf storage/app/private/customizations/9999
          echo "sub-check 4: /storage/customizations/* correctly returns 404 ✓"

          # ── Phase 7 sub-check 5 — all Phase 7 routes registered with correct names ──
          echo "== Phase 7 sub-check 5: Phase 7 routes registered with correct names ==" >&2
          php artisan tinker --execute="
            \$want = [
                'cart.add.customized',
                'orders.proofs.approve',
                'orders.proofs.reject',
                'orders.files.show',
                'vendor.products.customization-fields.index',
                'vendor.products.customization-fields.store',
                'vendor.products.customization-fields.update',
                'vendor.products.customization-fields.destroy',
                'vendor.orders.proofs.upload',
                'vendor.orders.proofs.send',
                'vendor.orders.files.show',
            ];
            \$missing = [];
            foreach (\$want as \$name) {
                if (! \Illuminate\Support\Facades\Route::has(\$name)) { \$missing[] = \$name; }
            }
            if (\$missing) {
                fwrite(STDERR, 'Phase 7 FAIL — missing routes: '.implode(', ', \$missing).PHP_EOL);
                exit(1);
            }
            echo 'sub-check 5: all '.count(\$want).' Phase 7 routes registered ✓'.PHP_EOL;
          "

          echo PHP_EOL . "✅ Phase 7 OK — customizable products end-to-end: schema present, demo seeded, sample order with sent proof, ProofWorkflowService state machine works, private disk never exposed at /storage, all 11 Phase 7 routes registered." . PHP_EOL

      - name: v5.6 — public-disk uploads are world-readable + no 403
        env:
          APP_ENV: local
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_DATABASE: marketplace_testing
          DB_USERNAME: marketplace
          DB_PASSWORD: secret
          REDIS_HOST: 127.0.0.1
        run: |
          set -e
          php artisan tinker --execute="
            \$path = \Illuminate\Http\UploadedFile::fake()
                ->image('v56-perm-test.jpg', 100, 100)
                ->store('products/v56', 'public');
            \$absolute = \Illuminate\Support\Facades\Storage::disk('public')->path(\$path);
            \$mode = fileperms(\$absolute) & 0777;
            if ((\$mode & 0004) === 0) {
                fwrite(STDERR, sprintf('Uploaded file mode 0%o — not world-readable (would 403 in browser). Check config/filesystems.php permissions block.', \$mode));
                exit(1);
            }
            // Confirm the demo product image (seeded by DemoSeeder) is also readable
            \$demo = \App\Models\Product::where('status', 'published')->first()?->primaryImage()->first();
            if (\$demo) {
                \$demoAbs = \Illuminate\Support\Facades\Storage::disk('public')->path(\$demo->path);
                if (!is_readable(\$demoAbs)) {
                    fwrite(STDERR, 'Demo product image not readable: '.\$demoAbs);
                    exit(1);
                }
            }
            echo sprintf('Public disk uploads OK (mode 0%o, world-readable).', \$mode);
            unlink(\$absolute);
          "

      - name: Phase 4 audit-item coverage map
        if: always()
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_DATABASE: marketplace_testing
          DB_USERNAME: marketplace
          DB_PASSWORD: secret
          REDIS_HOST: 127.0.0.1
        run: |
          # Run each Phase 4 test file separately so a failure cleanly identifies
