      - name: Phase 9 v9.1 — Filament closure parameters use Filament-injectable names (no bare $s, $x, $r)
        run: |
          # ROOT CAUSE (v9.0 → v9.1): I wrote
          #   ->dehydrateStateUsing(fn ($s) => strtoupper(trim((string) $s)))
          # in CouponResource. Filament injects closure parameters BY NAME for
          # the documented set (state, record, component, get, set, livewire,
          # context, operation, ...). The name `$s` isn't recognized, so the
          # container raised:
          #   BindingResolutionException: An attempt was made to evaluate a
          #   closure for [Filament\Forms\Components\TextInput], but [$s] was
          #   unresolvable.
          #
          # This v9.1 check scans every closure passed DIRECTLY to a Filament
          # setter (the only place name-based injection happens) and verifies
          # each parameter is either:
          #   (a) typed (Filament resolves typed params via the service
          #       container — name is irrelevant), or
          #   (b) untyped but with a documented Filament-injectable name.
          #
          # Closures inside other code (Eloquent ->when(), collect()->map())
          # are NOT flagged — they're regular PHP callbacks unrelated to
          # Filament's container.
          python3 << 'PY'
          import re, sys
          from pathlib import Path

          ALLOWED_NAMES = {
              'state', 'record', 'component', 'get', 'set', 'livewire', 'context',
              'operation', 'old', 'rawState', 'model', 'data', 'form', 'table',
              'recordKey', 'request', 'event', 'arguments',
          }

          FILAMENT_SETTERS = (
              '(?:dehydrateStateUsing|afterStateUpdated|formatStateUsing|visible|'
              'hidden|required|disabled|enabled|options|helperText|placeholder|'
              'default|using|action|live|extraAttributes|color|icon|label|tooltip|'
              'content|mutateBeforeSave|mutateBeforeFill|fillForm|'
              'mutateFormDataBeforeCreate|mutateFormDataBeforeSave)'
          )
          pat = re.compile(
              r'->' + FILAMENT_SETTERS + r'\s*\(\s*fn\s*\(\s*([^)]*)\s*\)\s*(?::[^=>]*)?=>',
              re.MULTILINE,
          )

          bad = []
          for p in sorted(Path('app/Filament').rglob('*.php')):
              src = p.read_text()
              for m in pat.finditer(src):
                  params = m.group(1).strip()
                  if not params: continue
                  for piece in params.split(','):
                      piece = piece.strip()
                      if not piece: continue
                      token_part = piece.split('=')[0].strip()
                      tokens = token_part.split()
                      has_type = len(tokens) > 1 and not tokens[0].startswith('$') and not tokens[0].startswith('&')
                      vmatch = re.search(r'\$(\w+)', piece)
                      if not vmatch: continue
                      name = vmatch.group(1)
                      if has_type: continue
                      if name in ALLOWED_NAMES: continue
                      line = src[:m.start()].count('\n') + 1
                      bad.append((str(p), line, name, params))

          if bad:
              print(f"::error::Phase 9 v9.1 Filament closure injection check FAILED — {len(bad)} bad closure(s):")
              for f, l, n, params in bad:
                  print(f"::error file={f},line={l}::Untyped closure parameter ${n} (whole: '{params}') in a Filament setter — Filament will raise BindingResolutionException at form-render time.")
                  print(f"::error::  Fix: either type-hint the parameter (e.g. `fn (?string $state): string => ...`) or rename it to one of: state, record, component, get, set, livewire, context, operation.")
              sys.exit(1)

          print("✓ Phase 9 v9.1 — every Filament-setter closure uses container-injectable params.")
          PY

