      - name: Phase 7 v7.4 — model-level safeguard against null file_path
        run: |
          # ROOT CAUSE (v7.3 dev report): the developer reported the SAME
          # "Column 'file_path' cannot be null" error after pulling v7.3.
          # Investigation: v7.3 wrapped Storage::put in try/catch, but
          # Laravel's Storage::put returns BOOL on failure — it does NOT
          # throw an exception. So the catch block never fired, and code
          # paths that bypassed the seeder (factories, services, future
          # contributors) could still feed null to CustomizationProof::create.
          #
          # v7.4 ships:
          #  - DemoSeeder now CHECKS Storage::put's return value AND
          #    verifies the file exists on disk after writing.
          #  - CustomizationProof model has a `creating` event that throws
          #    LogicException with a clear, actionable message if file_path
          #    is null/empty. This means ANY code path that tries to create
          #    a proof without a real path fails LOUD at the PHP level
          #    BEFORE the SQL round trip, with an error message that points
          #    at the actual bug (not a cryptic SQLSTATE[23000]).
          #
          # This static sub-check asserts the model safeguard exists
          # (greps for the creating event + the LogicException) so the
          # defense can't be silently removed by a future refactor.
          python3 << 'PY'
          import re, sys
          from pathlib import Path

          model_src = Path('app/Models/CustomizationProof.php').read_text()

          checks = [
              ('booted method exists',         r'protected\s+static\s+function\s+booted\s*\(\s*\)\s*:\s*void'),
              ('creating event registered',    r'static::creating\('),
              ('empty\\(\\) check on file_path', r'empty\(\$proof->file_path\)'),
              ('LogicException is thrown',     r'throw\s+new\s+\\?LogicException\('),
              ('error message mentions file_path', r"'file_path cannot be null"),
          ]
          missing = []
          for name, pat in checks:
              if not re.search(pat, model_src):
                  missing.append(name)

          if missing:
              print(f"::error::Phase 7 v7.4 model-safeguard check FAILED — {len(missing)} missing element(s):")
              for m in missing: print(f"::error file=app/Models/CustomizationProof.php::missing: {m}")
              sys.exit(1)
          print("✓ Phase 7 v7.4 model safeguard confirmed: CustomizationProof::creating event throws LogicException when file_path is empty.")

          # Also assert the seeder uses the rigorous return-value check (not just try/catch)
          seeder_src = Path('database/seeders/DemoSeeder.php').read_text()
          if not re.search(r'\$putResult\s*=\s*\\?Illuminate\\Support\\Facades\\Storage::disk\(.local.\)->put', seeder_src):
              print("::error file=database/seeders/DemoSeeder.php::Phase 7 v7.4: seeder does not capture Storage::put return value — Storage::put returns bool on failure, must be checked")
              sys.exit(1)
          if not re.search(r'\$putResult\s*===\s*true\s+&&\s+\\?Illuminate\\Support\\Facades\\Storage::disk\(.local.\)->exists', seeder_src):
              print("::error file=database/seeders/DemoSeeder.php::Phase 7 v7.4: seeder does not verify file exists on disk after write — must check $putResult === true AND Storage::exists()")
              sys.exit(1)
          print("✓ Phase 7 v7.4 seeder check confirmed: Storage::put return value AND post-write file existence are both verified.")
          PY

