      - name: Phase 9 v9.4 — refreshFulfillment force-reloads items after mass-update (stale-read fix)
        run: |
          # FINDING #25 from Codex audit: OrderLifecycleService::refreshFulfillment
          # called $order->loadMissing('items') AFTER an in-place DB mass-update
          # on the same items. loadMissing is a no-op when the relation is
          # already loaded → pluck() read stale in-memory statuses → multi-item
          # orders' aggregate fulfillment_status lagged one transition behind.
          # v9.4 uses $order->load('items') (force-reload).
          python3 << 'PY'
          import re, sys
          from pathlib import Path
          src = Path('app/Domain/Order/OrderLifecycleService.php').read_text()
          # Find the refreshFulfillment method body
          m = re.search(r'private function refreshFulfillment\(.*?\)\s*:\s*void\s*\{(.+?)^\s*\}', src, re.DOTALL | re.MULTILINE)
          if not m:
              print("::error::Phase 9 v9.4: refreshFulfillment method not found in OrderLifecycleService")
              sys.exit(1)
          body = m.group(1)
          if "loadMissing('items')" in body:
              print("::error file=app/Domain/Order/OrderLifecycleService.php::Phase 9 v9.4: refreshFulfillment still uses loadMissing — stale-read bug — use $order->load('items')")
              sys.exit(1)
          if "load('items')" not in body:
              print("::error::Phase 9 v9.4: refreshFulfillment must call $order->load('items') after the mass-update to re-read fresh statuses")
              sys.exit(1)
