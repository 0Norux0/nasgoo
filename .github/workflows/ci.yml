            "tests/Feature/Phase5V63RegressionTest.php|Phase 5 v6.3: regression — RolesAndPermissionsSeeder runs without PermissionDoesNotExist crash (root cause: PHP duplicate-array-keys in permissionCatalogue silently dropped orders.confirm/ship/deliver/cancel/refund + payments.capture/refund); catalogue has no duplicate top-level keys; every permission referenced by ->can() in OrderResource pages is registered; super_admin role + user actually have every order lifecycle permission (runtime can() returns true, not just source contains); action visibility predicates evaluate true on actionable orders; lifecycle confirm/ship/deliver each write order_event + audit_log row"
