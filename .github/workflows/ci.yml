                \$req->setUserResolver(fn () => \$admin);
                \$resp = \$kernel->handle(\$req);
                if (\$resp->getStatusCode() >= 500) {
                    fwrite(STDERR, 'Phase 6 FAIL — GET '.\$url.' returned '.\$resp->getStatusCode().' under strict mode.'.PHP_EOL);
                    fwrite(STDERR, 'Body: ' . substr((string) \$resp->getContent(), 0, 600).PHP_EOL);
                    exit(1);
                }
                echo 'Phase 6 step 5: GET '.\$url.' → '.\$resp->getStatusCode().' ✓'.PHP_EOL;
            }
          "

          echo PHP_EOL . '✅ Phase 6 OK — supplier platforms registered; vendor integration encrypted; supplier products in pending/mapped/published; dropship customer order auto-created a supplier_order; status state machine works; vendor + admin Phase 6 pages open under strict mode.' . PHP_EOL

      - name: Phase 6 v7.1 — APP_KEY setup verification (regression check on local-install crash)
        env:
          APP_ENV: local
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_DATABASE: marketplace_testing
          DB_USERNAME: marketplace
          DB_PASSWORD: secret
        run: |
          set -e
          # ROOT CAUSE: developer ran `php artisan migrate:fresh --seed` on a
          # fresh local clone WITHOUT first running `php artisan key:generate`.
          # The Phase 6 seed creates a SupplierIntegration with encrypted
          # credentials, which calls the Encrypter, which throws
          # MissingAppKeyException partway through the seed.
          #
          # v7.1 trips a clear RuntimeException from DemoSeeder::run() BEFORE
          # any encrypted writes are attempted. This CI step verifies the
          # guard message AND verifies the happy-path (APP_KEY set →
          # migrate:fresh --seed succeeds and the integration's credentials
          # column is encrypted at rest).

          echo "== v7.1 sub-check 1: .env.example has APP_KEY= with no pre-filled value ==" >&2
          if ! grep -qE '^APP_KEY=$' .env.example; then
