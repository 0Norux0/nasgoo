            }
            echo 'v6.3 step 4 OK — actionable orders: paid #' . \$paid->id . ' confirmed #' . \$confirmed->id . ' shipped #' . \$shipped->id . ' cod-pending #' . \$codPending->id . PHP_EOL;
          "

