      - name: Phase 8 v8.6 — `php artisan marketplace:version` runs and reports zero static defense failures
        env:
          APP_ENV: local
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_DATABASE: marketplace_testing
          DB_USERNAME: marketplace
          DB_PASSWORD: secret
          MAIL_MAILER: log
        run: |
          # The command runs the same 4 static checks (duplicate-test-fn,
          # form-errors-key, schema-vs-runtime-data, identifier-length) that
          # have their own CI steps elsewhere — running them via artisan
          # confirms the in-app entrypoint works AND gives one combined
          # PASS/FAIL the developer can reproduce locally with a single
