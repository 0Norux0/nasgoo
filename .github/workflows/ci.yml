      - name: Phase 7 v7.3 — null-vs-NOT-NULL pre-flight (prevents v7.2 file_path-null bug class)
        run: |
          # ROOT CAUSE (v7.2 dev report): the Phase 7 demo seeder inserted
          # customization_proofs with file_path = null, but the migration
          # declares the column NOT NULL (no ->nullable()). SQL rejected:
          #   "SQLSTATE[23000]: Integrity constraint violation: 1048
          #    Column 'file_path' cannot be null"
          #
          # v7.3 ships:
          #  - The Phase 7 demo seeder now writes a real placeholder PNG to
          #    the private disk and uses its REAL path on both the proof
          #    record and the customer's photo upload. Storage::put is wrapped
          #    in try/catch; if the disk is unwritable, the proof record is
          #    skipped entirely (graceful degradation) rather than violating
          #    the constraint.
          #  - This static pre-flight asserts NO Phase 7 write passes `null`
          #    for a column that the migration declares NOT NULL. Fails loud
          #    with a Phase 7-specific message BEFORE migrate:fresh --seed
          #    is executed.
          python3 << 'PY'
          import re, sys
          from pathlib import Path

          src = Path('database/seeders/DemoSeeder.php').read_text()
          m = re.search(r'private function seedCustomizableProductsAndOrder\(\): void\s*\{', src)
          if not m:
              print("::error::Phase 7 v7.3 pre-flight: seedCustomizableProductsAndOrder method not found")
              sys.exit(1)
          depth = 0
          for i in range(m.end()-1, len(src)):
              if src[i] == '{': depth += 1
              elif src[i] == '}':
                  depth -= 1
                  if depth == 0:
                      method = src[m.end():i]; break

          mig_files = sorted(Path('database/migrations').glob('*.php'))

          def up_body(mf):
              s = mf.read_text()
              upm = re.search(r"public function up\(\)\s*:\s*void\s*\{", s)
              if not upm: return ''
              d = 0
              for i in range(upm.end()-1, len(s)):
                  if s[i] == '{': d += 1
                  elif s[i] == '}':
                      d -= 1
                      if d == 0: return s[upm.end():i]
              return ''

          def nullable_cols(table):
              cols = set()
              for mf in mig_files:
                  upb = up_body(mf)
                  if not upb: continue
                  for sigm in re.finditer(rf"Schema::(?:create|table)\(\s*'{table}'\s*,\s*function\s*\(\s*Blueprint\s+\$table\s*\)\s*\{{", upb):
                      d = 0
                      for i in range(sigm.end()-1, len(upb)):
                          if upb[i] == '{': d += 1
                          elif upb[i] == '}':
                              d -= 1
                              if d == 0: body = upb[sigm.end():i]; break
                      for stmt in re.split(r';', body):
                          if '->nullable(' in stmt:
                              cm = re.search(r"\$table->\w+\(\s*'([a-z_]+)'", stmt)
                              if cm: cols.add(cm.group(1))
              return cols

          def all_cols(table):
              cols = set()
              for mf in mig_files:
                  upb = up_body(mf)
                  if not upb: continue
                  for sigm in re.finditer(rf"Schema::(?:create|table)\(\s*'{table}'\s*,\s*function\s*\(\s*Blueprint\s+\$table\s*\)\s*\{{", upb):
                      d = 0
                      for i in range(sigm.end()-1, len(upb)):
                          if upb[i] == '{': d += 1
                          elif upb[i] == '}':
                              d -= 1
                              if d == 0: body = upb[sigm.end():i]; break
                      for cm in re.finditer(r"\$table->\w+\(\s*'([a-z_]+)'", body):
                          cols.add(cm.group(1))
                      for dr in re.finditer(r"->dropColumn\(\s*'([a-z_]+)'\s*\)", body): cols.discard(dr.group(1))
                      for db in re.finditer(r"->dropColumn\(\s*\[(.*?)\]\s*\)", body, re.DOTALL):
                          for c in re.findall(r"'([a-z_]+)'", db.group(1)): cols.discard(c)
              return cols

          model_to_table = {
              'CustomizationProof':'customization_proofs',
              'OrderItemCustomization':'order_item_customizations',
              'CartItemCustomization':'cart_item_customizations',
              'ProductCustomizationField':'product_customization_fields',
              'CartItem':'cart_items','OrderItem':'order_items','Order':'orders',
              'OrderAddress':'order_addresses','Product':'products',
          }

          bad = []
          for nm in re.finditer(r"'([a-z_]+)'\s*=>\s*null\b", method):
              pre = method[:nm.start()]
              last = max(pre.rfind('::create('), pre.rfind('::firstOrCreate('), pre.rfind('::updateOrCreate('),
                         pre.rfind('->create('), pre.rfind('->createMany('))
              if last < 0: continue
              pre2 = pre[:last]
              mod_match = re.search(r'(?:App\\Models\\)?(\w+)\s*(?:::|->)\s*\w*$', pre2[-300:])
              model = mod_match.group(1) if mod_match else None
              t = model_to_table.get(model)
              if not t: continue
              nn = all_cols(t) - nullable_cols(t) - {'id','created_at','updated_at','deleted_at','remember_token'}
              if nm.group(1) in nn:
                  bad.append((model, t, nm.group(1)))

          if bad:
              print(f"::error::Phase 7 v7.3 null-vs-NOT-NULL pre-flight FAILED — {len(bad)} write(s) pass NULL for a NOT NULL column:")
              for b in bad: print(f"::error file=database/seeders/DemoSeeder.php::{b[0]}::create(['{b[2]}' => null]) — table {b[1]}.{b[2]} is NOT NULL in the migration")
              sys.exit(1)
          print("✓ Phase 7 v7.3 null-vs-NOT-NULL pre-flight CLEAN — no Phase 7 write passes null for a NOT NULL column.")
          PY

      - name: "Phase 7 v7.3 — runtime check: every proof has a real file on disk"
        env:
