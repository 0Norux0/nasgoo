              echo "::error::Phase 11A v11A.3: homepage-system-status section still uses text-slate-500 on bg-slate-100 (FAILS AA)"
              exit 1
          fi
          # Must contain text-slate-700 (AA-compliant on slate-100)
          echo "$BLOCK" | grep -q 'text-slate-700' || {
              echo "::error::Phase 11A v11A.3: homepage-system-status section missing accessible text-slate-700"
              exit 1
          }
          echo "✓ Phase 11A v11A.3 — system status strip meets WCAG AA on slate-100"

